<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ArrowMap by GeoHunter.jp</title>
<style>
  :root {
    --bg: #f4f3ef;
    --panel: #ffffff;
    --border: #ddd9cf;
    --border-strong: #c7c2b4;
    --text: #2b2a26;
    --text-muted: #8a8578;
    --accent: #b5502e;
    --accent-soft: #f2e2da;
  }
  html[data-theme="dark"] {
    --bg: #1c1b18;
    --panel: #26251f;
    --border: #3c3a33;
    --border-strong: #504e44;
    --text: #ece7db;
    --text-muted: #9d9789;
    --accent: #e08256;
    --accent-soft: #3d2c22;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: "Hiragino Sans", "Yu Gothic", "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
  }
  #app { display: flex; height: 100vh; width: 100vw; }
  #toolbar {
    position: absolute;
    top: 12px; left: 12px; right: 12px;
    z-index: 20;
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 10px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.14);
    flex-wrap: wrap;
  }
  .btn {
    background: var(--panel);
    border: 1px solid var(--border-strong);
    border-radius: 7px;
    padding: 7px 12px;
    font-size: 13px;
    color: var(--text);
    cursor: pointer;
    white-space: nowrap;
  }
  .btn:hover { filter: brightness(0.97); }
  html[data-theme="dark"] .btn:hover { filter: brightness(1.15); }
  .btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn:disabled { opacity: 0.4; cursor: default; }
  .sep { width: 1px; height: 22px; background: var(--border-strong); margin: 0 2px; }
  #title { font-size: 14px; font-weight: 700; margin-right: 4px; color: var(--accent); white-space: nowrap; }
  #fileSelect {
    font-size: 13px;
    padding: 6px 8px;
    border-radius: 7px;
    border: 1px solid var(--border-strong);
    background: var(--panel);
    color: var(--text);
    max-width: 150px;
  }
  #hint { font-size: 12px; color: var(--text-muted); margin-left: auto; white-space: nowrap; }
  #settingsWrap { position: relative; flex: none; }
  #settingsBtn { font-size: 15px; padding: 6px 10px; line-height: 1; }
  #settingsMenu {
    position: absolute; top: calc(100% + 6px); right: 0;
    background: var(--panel); border: 1px solid var(--border-strong);
    border-radius: 9px; box-shadow: 0 4px 16px rgba(0,0,0,0.22);
    padding: 6px; display: none; flex-direction: column; gap: 4px;
    z-index: 50; min-width: 130px;
  }
  #settingsMenu.open { display: flex; }
  #settingsMenu .btn { width: 100%; text-align: left; }
  #canvasWrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    background-color: var(--bg);
    cursor: grab;
  }
  html:not([data-theme="dark"]) #canvasWrap {
    background-image:
      linear-gradient(45deg, #eae8e1 25%, transparent 25%) -20px 0,
      linear-gradient(-45deg, #eae8e1 25%, transparent 25%) -20px 0,
      linear-gradient(45deg, transparent 75%, #eae8e1 75%),
      linear-gradient(-45deg, transparent 75%, #eae8e1 75%);
    background-size: 40px 40px;
  }
  html[data-theme="dark"] #canvasWrap {
    background-image:
      linear-gradient(45deg, #252420 25%, transparent 25%) -20px 0,
      linear-gradient(-45deg, #252420 25%, transparent 25%) -20px 0,
      linear-gradient(45deg, transparent 75%, #252420 75%),
      linear-gradient(-45deg, transparent 75%, #252420 75%);
    background-size: 40px 40px;
  }
  #canvasWrap.panning { cursor: grabbing; }
  #canvasWrap.ctrlActive { cursor: crosshair; }
  #canvasWrap.shiftActive { cursor: cell; }
  #world { position: absolute; top: 0; left: 0; transform-origin: 0 0; }
  #bgImg { display: block; max-width: none; pointer-events: none; user-select: none; }
  #placeholder {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center; color: var(--text-muted); font-size: 14px; width: 320px;
    pointer-events: none;
  }
  svg#arrowLayer { position: absolute; top: 0; left: 0; overflow: visible; pointer-events: none; }
  .arrow-hit { pointer-events: stroke; cursor: pointer; stroke: transparent; stroke-width: 16; fill: none; }
  .arrow-shaft { stroke-width: 4; fill: none; pointer-events: none; stroke-linejoin: round; stroke-linecap: round; }
  .arrow-shaft.selected { stroke-width: 5; }
  .arrow-num { fill: #fff; font-size: 11px; font-weight: 700; pointer-events: none; text-anchor: middle; dominant-baseline: central; }
  .arrow-num-bg { pointer-events: none; }
  .arrow-num-bg.selected { stroke: #1e6e4a; stroke-width: 2; }
  .bend-dot { fill: #fff; pointer-events: none; }
  .area-shape { pointer-events: all; cursor: pointer; }
  .area-num-bg { pointer-events: none; }
  .area-num-bg.selected { stroke: #1e6e4a; stroke-width: 2; }
  .vertex-handle { fill: #fff; stroke: var(--accent); stroke-width: 2.5; cursor: move; pointer-events: all; }
  .vertex-handle:hover { fill: var(--accent); }
  .label-handle { fill: var(--accent); stroke: #fff; stroke-width: 2; cursor: move; opacity: 0.9; pointer-events: all; }
  #shapeEditBanner {
    position: absolute; top: 60px; left: 50%; transform: translateX(-50%);
    z-index: 25; background: var(--panel); border: 1px solid var(--accent);
    border-radius: 9px; box-shadow: 0 4px 16px rgba(0,0,0,0.22);
    padding: 8px 10px; display: none; align-items: center; gap: 10px;
    font-size: 12px; color: var(--text);
  }
  #shapeEditBanner.open { display: flex; }
  #shapeEditBanner .btn { font-size: 12px; padding: 5px 10px; }

  .ctx-menu {
    position: fixed; z-index: 60; background: var(--panel);
    border: 1px solid var(--border-strong); border-radius: 9px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.25); padding: 6px; display: none;
    flex-direction: column; gap: 2px; min-width: 150px;
  }
  .ctx-menu.open { display: flex; }
  .ctx-menu button {
    background: none; border: none; text-align: left; padding: 7px 10px;
    font-size: 13px; color: var(--text); cursor: pointer; border-radius: 6px;
    font-family: inherit;
  }
  .ctx-menu button:hover { background: var(--accent-soft); }

  #exportWrap { position: relative; }
  #exportMenu {
    position: absolute; top: calc(100% + 6px); left: 0;
    background: var(--panel); border: 1px solid var(--border-strong);
    border-radius: 9px; box-shadow: 0 4px 16px rgba(0,0,0,0.22);
    padding: 6px; display: none; flex-direction: column; gap: 4px;
    z-index: 50; min-width: 170px;
  }
  #exportMenu.open { display: flex; }
  #exportMenu .btn { width: 100%; text-align: left; }

  #pngExportOverlay {
    position: fixed; inset: 0; z-index: 80; display: none;
    align-items: center; justify-content: center;
    background: rgba(0,0,0,0.35);
  }
  #pngExportOverlay.open { display: flex; }
  #pngExportDialog {
    background: var(--panel); border: 1px solid var(--border-strong);
    border-radius: 10px; box-shadow: 0 8px 28px rgba(0,0,0,0.3);
    padding: 16px 18px; min-width: 280px; max-width: 90vw;
  }
  #pngExportTitle { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 12px; }
  #pngExportCheckRow {
    display: flex; align-items: center; gap: 8px; font-size: 13px;
    color: var(--text); cursor: pointer; margin-bottom: 16px;
  }
  #pngExportCheckRow input { cursor: pointer; }
  #pngExportDialog .row .btn { flex: 1; text-align: center; font-size: 13px; padding: 7px; }

  .note-item .body-edit {
    flex: 1 1 auto; min-width: 0;
    font-family: inherit; font-size: 13px; color: var(--text);
    background: var(--bg); border: 1px solid var(--border-strong); border-radius: 6px;
    padding: 5px 6px; resize: vertical; min-height: 46px;
  }

  #sidebar { width: 300px; background: var(--panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; z-index: 15; }
  #sidebarHeader { padding: 12px 14px 8px; border-bottom: 1px solid var(--border); font-size: 13px; color: var(--text-muted); }
  #noteList { flex: 1; overflow-y: auto; padding: 6px; }
  .note-item { padding: 8px 10px; border-radius: 8px; margin-bottom: 4px; cursor: pointer; border: 1px solid transparent; font-size: 13px; display: flex; gap: 8px; align-items: flex-start; }
  .note-item:hover { background: var(--accent-soft); }
  .note-item.selected { background: var(--accent-soft); border-color: var(--accent); }
  .note-item.dragging { opacity: 0.4; }
  .note-item.drag-over { border-top: 2px solid var(--accent); }
  .note-item .note-grip {
    flex: none; cursor: grab; color: var(--text-muted); font-size: 11px; line-height: 18px;
    letter-spacing: -2px; margin-top: 1px; user-select: none;
  }
  .note-item .note-grip:active { cursor: grabbing; }
  .note-item .num {
    flex: none;
    display: inline-flex; align-items: center; justify-content: center;
    width: 18px; height: 18px; border-radius: 50%; color: #fff; font-size: 10px; margin-top: 1px;
  }
  .note-item .num.square { border-radius: 5px; }
  .note-item .body { color: var(--text); white-space: pre-wrap; word-break: break-word; }
  .note-item .empty { color: var(--text-muted); font-style: italic; }
  #emptyList { padding: 20px 14px; color: var(--text-muted); font-size: 13px; line-height: 1.6; }

  #popup {
    position: absolute; z-index: 30;
    background: var(--panel);
    border: 1px solid var(--border-strong);
    border-radius: 10px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.25);
    padding: 10px;
    width: 260px;
    max-height: 88vh;
    overflow-y: auto;
    display: none;
  }
  #popup textarea {
    width: 100%; height: 70px; resize: vertical;
    font-family: inherit; font-size: 13px;
    border: 1px solid var(--border); border-radius: 6px; padding: 6px;
    background: var(--bg); color: var(--text);
  }
  #bidirWrap { display: flex; align-items: center; gap: 6px; margin-top: 8px; font-size: 12px; color: var(--text); }
  #bidirWrap input { margin: 0; }
  #thinWrap { display: flex; align-items: center; gap: 6px; margin-top: 8px; font-size: 12px; color: var(--text); }
  #thinWrap input { margin: 0; }
  #colorSection { margin-top: 10px; }
  #cpHeaderRow { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  #cpHeaderRow .cpHeaderLabel { font-size: 12px; color: var(--text-muted); }
  #cpHex {
    width: 84px; font-size: 12px; font-family: monospace; text-align: center;
    padding: 4px 5px; border-radius: 6px; border: 1px solid var(--border-strong);
    background: var(--bg); color: var(--text); text-transform: uppercase;
  }
  #cpBox {
    position: relative; width: 100%; height: 110px; border-radius: 8px;
    cursor: crosshair; margin-bottom: 8px; border: 1px solid var(--border-strong);
    touch-action: none; overflow: hidden;
  }
  #cpBox .cpLayerWhite { position: absolute; inset: 0; background: linear-gradient(to right, #fff, rgba(255,255,255,0)); }
  #cpBox .cpLayerBlack { position: absolute; inset: 0; background: linear-gradient(to top, #000, rgba(0,0,0,0)); }
  #cpBoxThumb {
    position: absolute; width: 14px; height: 14px; border-radius: 50%;
    border: 2px solid #fff; box-shadow: 0 0 0 1px rgba(0,0,0,0.35), 0 1px 3px rgba(0,0,0,0.4);
    transform: translate(-50%, -50%); pointer-events: none;
  }
  #cpHueBar {
    position: relative; width: 100%; height: 14px; border-radius: 7px;
    margin-bottom: 10px; cursor: pointer; touch-action: none;
    background: linear-gradient(to right, #f00, #ff0, #0f0, #0ff, #00f, #f0f, #f00);
    border: 1px solid var(--border-strong);
  }
  #cpHueThumb {
    position: absolute; top: 50%; width: 16px; height: 16px; border-radius: 50%;
    border: 2px solid #fff; box-shadow: 0 0 0 1px rgba(0,0,0,0.35), 0 1px 3px rgba(0,0,0,0.4);
    transform: translate(-50%, -50%); pointer-events: none; background: transparent;
  }
  .colorGroupLabel { font-size: 11px; color: var(--text-muted); margin-top: 6px; margin-bottom: 4px; }
  #colorRow, #commonColorRow { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  #commonColorRow { margin-bottom: 2px; }
  .swatch {
    width: 20px; height: 20px; border-radius: 50%;
    border: 2px solid transparent; cursor: pointer; padding: 0;
  }
  .swatch.selected { border-color: var(--text); }
  #colorLabel { font-size: 12px; color: var(--text-muted); }
  #popup .row { display: flex; justify-content: space-between; margin-top: 8px; gap: 6px; }
  #popup .row .btn { flex: 1; text-align: center; font-size: 12px; padding: 6px; }
  #popup .del { color: #c0392b; border-color: #d9b3ab; }

  #fileInput, #importInput { display: none; }

  #toast {
    position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
    background: var(--text); color: var(--bg); padding: 7px 14px; border-radius: 20px; font-size: 12px;
    opacity: 0; transition: opacity 0.25s; pointer-events: none; z-index: 40;
  }
  #toast.show { opacity: 0.92; }
  #hoverTip {
    position: fixed;
    display: none;
    max-width: 260px;
    background: rgba(20,20,20,0.92);
    color: #fff;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 12px;
    line-height: 1.45;
    white-space: pre-wrap;
    word-break: break-word;
    pointer-events: none;
    z-index: 9999;
    box-shadow: 0 2px 8px rgba(0,0,0,0.35);
  }
</style>
</head>
<body>
<div id="app">
  <div id="canvasWrap">
    <div id="toolbar">
      <span id="title">ArrowMap</span>
      <select id="fileSelect"></select>
      <button class="btn" id="newFileBtn"></button>
      <button class="btn" id="renameFileBtn"></button>
      <button class="btn" id="deleteFileBtn"></button>
      <div class="sep"></div>
      <button class="btn" id="loadBtn"></button>
      <div class="sep"></div>
      <button class="btn" id="undoBtn"></button>
      <button class="btn" id="redoBtn"></button>
      <div class="sep"></div>
      <button class="btn" id="zoomOut">－</button>
      <button class="btn" id="zoomReset">100%</button>
      <button class="btn" id="zoomIn">＋</button>
      <div class="sep"></div>
      <div id="exportWrap">
        <button class="btn" id="exportBtn"></button>
        <div id="exportMenu">
          <button class="btn" id="exportJsonBtn"></button>
          <button class="btn" id="exportPngBtn"></button>
        </div>
      </div>
      <button class="btn" id="importBtn"></button>
      <button class="btn" id="clearBtn"></button>
      <span id="hint"></span>
      <div id="settingsWrap">
        <button class="btn" id="settingsBtn" title="Settings">⚙</button>
        <div id="settingsMenu">
          <button class="btn" id="themeToggle"></button>
          <button class="btn" id="langToggle"></button>
          <button class="btn" id="thinDefaultToggle"></button>
        </div>
      </div>
    </div>
    <div id="canvasWrap2" style="position:absolute; inset:0;">
      <div id="world">
        <img id="bgImg" src="" style="display:none;">
        <svg id="arrowLayer" width="1" height="1"></svg>
      </div>
      <div id="placeholder"></div>
    </div>
    <div id="popup">
      <textarea id="noteText"></textarea>
      <div id="colorSection">
        <div id="cpHeaderRow">
          <span class="cpHeaderLabel" id="colorLabel"></span>
          <input type="text" id="cpHex" maxlength="7">
        </div>
        <div id="cpBox">
          <div class="cpLayerWhite"></div>
          <div class="cpLayerBlack"></div>
          <div id="cpBoxThumb"></div>
        </div>
        <div id="cpHueBar">
          <div id="cpHueThumb"></div>
        </div>
        <div class="colorGroupLabel" id="quickAccessLabel"></div>
        <div id="colorRow"></div>
        <div class="colorGroupLabel" id="commonLabel"></div>
        <div id="commonColorRow"></div>
      </div>
      <div id="bidirWrap">
        <input type="checkbox" id="bidirCheck">
        <label for="bidirCheck" id="bidirLabel"></label>
      </div>
      <div id="thinWrap">
        <input type="checkbox" id="thinCheck">
        <label for="thinCheck" id="thinLabel"></label>
      </div>
      <div class="row">
        <button class="btn" id="editShapeBtn" style="flex:1; text-align:center;"></button>
      </div>
      <div class="row">
        <button class="btn del" id="deleteArrowBtn"></button>
        <button class="btn" id="closePopupBtn"></button>
      </div>
    </div>
    <div id="toast"></div>
    <div id="hoverTip"></div>
    <div id="shapeEditBanner">
      <span id="shapeEditBannerText"></span>
      <button class="btn" id="shapeEditDoneBtn"></button>
    </div>
    <div id="ctxMenu" class="ctx-menu"></div>
    <div id="pngExportOverlay">
      <div id="pngExportDialog">
        <div id="pngExportTitle"></div>
        <label id="pngExportCheckRow">
          <input type="checkbox" id="pngExportNotesCheck">
          <span id="pngExportCheckLabel"></span>
        </label>
        <div class="row">
          <button class="btn" id="pngExportCancelBtn"></button>
          <button class="btn" id="pngExportOkBtn"></button>
        </div>
      </div>
    </div>
  </div>
  <div id="sidebar">
    <div id="sidebarHeader"></div>
    <div id="noteList"></div>
  </div>
</div>
<input type="file" id="fileInput" accept="image/*">
<input type="file" id="importInput" accept="application/json">

  // ---------- arrow path helpers ----------
  function pathData(points){
    return points.map((p,i) => (i===0 ? 'M' : 'L') + p.x + ',' + p.y).join(' ');
  }
  function pathLength(points){
    let d = 0;
    for (let i=1;i<points.length;i++){
      d += Math.hypot(points[i].x - points[i-1].x, points[i].y - points[i-1].y);
    }
    return d;
  }
  function boundsCenter(points){
    const xs = points.map(p=>p.x), ys = points.map(p=>p.y);
    return { x: (Math.min(...xs) + Math.max(...xs)) / 2, y: (Math.min(...ys) + Math.max(...ys)) / 2 };
  }
  function pointAtT(points, t){
    const total = pathLength(points);
    if (total === 0) return points[0];
    const target = total * t;
    let acc = 0;
    for (let i=1;i<points.length;i++){
      const segLen = Math.hypot(points[i].x - points[i-1].x, points[i].y - points[i-1].y);
      if (acc + segLen >= target){
        const ratio = segLen === 0 ? 0 : (target - acc) / segLen;
        return {
          x: points[i-1].x + (points[i].x - points[i-1].x) * ratio,
          y: points[i-1].y + (points[i].y - points[i-1].y) * ratio
        };
      }
      acc += segLen;
    }
    return points[points.length - 1];
  }
  function colorId(hex){ return hex.replace('#','').toLowerCase(); }
  // the un-offset "natural" position for an item's numbered badge/label
  function rawLabelBase(item, type){
    return type === 'area'
      ? boundsCenter(item.points)
      : (item.bidirectional ? pointAtT(item.points, 0.5) : item.points[0]);
  }
  // the position of the numbered badge/label for an item, including any
  // manual offset the user dragged it to (so it can be moved off of
  // important background map content)
  function labelPos(item, type){
    const base = rawLabelBase(item, type);
    const off = item.labelOffset || {dx: 0, dy: 0};
    return { x: base.x + off.dx, y: base.y + off.dy };
  }
  // returns '#000' or '#fff' depending on which is more readable on top of the given hex color
  function contrastTextColor(hex){
    if (!hex) return '#fff';
    const h = hex.replace('#','');
    const full = h.length === 3 ? h.split('').map(c => c+c).join('') : h;
    const r = parseInt(full.substring(0,2), 16);
    const g = parseInt(full.substring(2,4), 16);
    const b = parseInt(full.substring(4,6), 16);
    if ([r,g,b].some(v => Number.isNaN(v))) return '#fff';
    // relative luminance (perceived brightness)
    const luminance = (0.299*r + 0.587*g + 0.114*b) / 255;
    return luminance > 0.62 ? '#000' : '#fff';
  }

  // ---------- smoothing for area outlines (closed Catmull-Rom -> cubic Bezier) ----------
  // Keeps the shape (concave/convex bumps) the user actually clicked, but
  // takes the edge off sharp corners instead of leaving a jagged polygon.
  // AREA_SMOOTH_ALPHA controls how much rounding is applied: 0 = straight
  // lines between the clicked points (no rounding at all), 1 = full
  // Catmull-Rom curve (a lot of rounding, shape drifts further from the
  // clicked points). A low value keeps the outline close to what was
  // actually clicked while still softening the corners a bit.
  const AREA_SMOOTH_ALPHA = 0.22;
  function smoothClosedPath(pts){
    const n = pts.length;
    if (n < 3) return '';
    if (n === 3) {
      // triangle: light rounding only, Catmull-Rom on 3 pts can overshoot
      return pathData(pts) + ' Z';
    }
    let d = 'M ' + pts[0].x.toFixed(2) + ',' + pts[0].y.toFixed(2) + ' ';
    for (let i=0;i<n;i++){
      const p0 = pts[(i-1+n)%n];
      const p1 = pts[i];
      const p2 = pts[(i+1)%n];
      const p3 = pts[(i+2)%n];
      const cp1x = p1.x + (p2.x - p0.x) * (AREA_SMOOTH_ALPHA / 3);
      const cp1y = p1.y + (p2.y - p0.y) * (AREA_SMOOTH_ALPHA / 3);
      const cp2x = p2.x - (p3.x - p1.x) * (AREA_SMOOTH_ALPHA / 3);
      const cp2y = p2.y - (p3.y - p1.y) * (AREA_SMOOTH_ALPHA / 3);
      d += 'C ' + cp1x.toFixed(2) + ',' + cp1y.toFixed(2) + ' ' + cp2x.toFixed(2) + ',' + cp2y.toFixed(2) + ' ' + p2.x.toFixed(2) + ',' + p2.y.toFixed(2) + ' ';
    }
    return d + 'Z';
  }

  // ---------- combined numbering (arrows + areas share one sequence) ----------
  function orderKey(item){ return (typeof item.order === 'number') ? item.order : item.id; }
  function combinedSorted(){
    const list = [
      ...arrows.map(a => ({ ref: a, type: 'arrow' })),
      ...areas.map(a => ({ ref: a, type: 'area' }))
    ];
    list.sort((x,y) => orderKey(x.ref) - orderKey(y.ref));
    return list;
  }
  function numberMap(){
    const map = {};
    combinedSorted().forEach((entry, idx) => { map[entry.ref.id] = idx + 1; });
    return map;
  }
  // reassigns explicit sequential `order` values to every item, moving
  // the item with id `fromId` to just before/after the item with id `toId`
  function reorderItem(fromId, toId){
    if (fromId === toId) return;
    const combined = combinedSorted();
    const fromIdx = combined.findIndex(e => e.ref.id === fromId);
    const toIdx = combined.findIndex(e => e.ref.id === toId);
    if (fromIdx === -1 || toIdx === -1) return;
    pushUndo();
    const [moved] = combined.splice(fromIdx, 1);
    const insertAt = combined.findIndex(e => e.ref.id === toId);
    combined.splice(insertAt, 0, moved);
    combined.forEach((entry, idx) => { entry.ref.order = idx; });
    renderArrows(); renderList(); scheduleSave();
  }

  // ---------- rendering ----------
  function renderArrows(){
    const {w,h} = worldSize();
    svg.setAttribute('width', w); svg.setAttribute('height', h);
    svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
    svg.innerHTML = '';

    const nums = numberMap();

      ms.setAttribute('id', 'arrowhead-start-' + colorId(c));
      ms.setAttribute('markerWidth', '4.0625');
      ms.setAttribute('markerHeight', '4.0625');
      ms.setAttribute('refX', '2.84375');
      ms.setAttribute('refY', '2.03125');
      ms.setAttribute('orient', 'auto-start-reverse');
      const paths = document.createElementNS('http://www.w3.org/2000/svg','path');
      paths.setAttribute('d', 'M0,0 L4.0625,2.03125 L0,4.0625 Z');
      paths.setAttribute('fill', c);

    svg.appendChild(defs);

    // areas render first so arrows always draw on top of the shading

      shape.addEventListener('mousedown', (e) => e.stopPropagation());
      shape.addEventListener('click', (e) => { if (e.ctrlKey || e.metaKey || e.shiftKey) return; e.stopPropagation(); openPopupFor(a.id); });

      rect.setAttribute('x', c.x - rectSize/2); rect.setAttribute('y', c.y - rectSize/2);

    arrows.forEach((a) => {
      const color = a.color || DEFAULT_COLOR;

      const pts = a.points;
      const g = document.createElementNS('http://www.w3.org/2000/svg','g');

      const hit = document.createElementNS('http://www.w3.org/2000/svg','path');
      hit.setAttribute('d', pathData(pts));
      hit.setAttribute('class', 'arrow-hit');
      hit.addEventListener('mousedown', (e) => e.stopPropagation());
      hit.addEventListener('click', (e) => { if (e.ctrlKey || e.metaKey || e.shiftKey) return; e.stopPropagation(); openPopupFor(a.id); });
      hit.addEventListener('mouseenter', (e) => showHoverTip(a.note, e));
      hit.addEventListener('mousemove', (e) => moveHoverTip(e));
      hit.addEventListener('mouseleave', hideHoverTip);
      hit.addEventListener('contextmenu', (e) => { e.preventDefault(); e.stopPropagation(); showShapeCtxMenu(e, a.id); });

      const shaft = document.createElementNS('http://www.w3.org/2000/svg','path');
      shaft.setAttribute('d', pathData(pts));
      shaft.setAttribute('class', 'arrow-shaft' + (selected ? ' selected' : ''));

  // ---------- shape-edit mode: draggable vertex + label handles ----------
  function renderEditHandles(item, type){
    const g = document.createElementNS('http://www.w3.org/2000/svg','g');
    item.points.forEach((p, i) => {
      const h = document.createElementNS('http://www.w3.org/2000/svg','circle');
      h.setAttribute('cx', p.x); h.setAttribute('cy', p.y);
      h.setAttribute('r', 7);
      h.setAttribute('class', 'vertex-handle');
      h.addEventListener('mousedown', (e) => { e.stopPropagation(); e.preventDefault(); startVertexDrag(item, i); });
      g.appendChild(h);
    });
    const lp = labelPos(item, type);
    const lh = document.createElementNS('http://www.w3.org/2000/svg','circle');
    lh.setAttribute('cx', lp.x); lh.setAttribute('cy', lp.y);
    lh.setAttribute('r', item.thin ? 9 : 12);
    lh.setAttribute('class', 'label-handle');
    lh.addEventListener('mousedown', (e) => { e.stopPropagation(); e.preventDefault(); startLabelDrag(item, type); });
    g.appendChild(lh);
    svg.appendChild(g);
  }

  let dragCtx = null;

    pushUndo();
    dragCtx = { kind: 'vertex', item, index };

  function startLabelDrag(item, type){

    dragCtx = { kind: 'label', item, rawBase: rawLabelBase(item, type) };
  }
  window.addEventListener('mousemove', (e) => {
    if (!dragCtx) return;
    const wc = toWorldCoords(e.clientX, e.clientY);
    if (dragCtx.kind === 'vertex') {
      dragCtx.item.points[dragCtx.index] = wc;
    } else if (dragCtx.kind === 'label') {
      dragCtx.item.labelOffset = { dx: wc.x - dragCtx.rawBase.x, dy: wc.y - dragCtx.rawBase.y };
    }
    renderArrows();
  });
  window.addEventListener('mouseup', () => {
    if (dragCtx) { dragCtx = null; renderList(); scheduleSave(); }
  });

    renderArrows();

  let dragFromId = null;
  let noteClickTimer = null;
  function renderList(){
    const combined = combinedSorted();
    if (combined.length === 0) {
      noteList.innerHTML = `<div id="emptyList">${t('emptyList')}</div>`;
      return;
    }
    noteList.innerHTML = '';
    combined.forEach((entry, idx) => {
      const a = entry.ref;
      const color = a.color || DEFAULT_COLOR;
      const item = document.createElement('div');
      item.className = 'note-item' + (a.id === selectedId ? ' selected' : '');
      item.dataset.id = a.id;
      const hasNote = a.note && a.note.trim();
      const bodyText = hasNote ? a.note : t('noNote');
      const shapeClass = entry.type === 'area' ? 'num square' : 'num';
      item.innerHTML = `<span class="note-grip" title="${t('dragHint')}">⠿⠿</span><span class="${shapeClass}" style="background:${color}; color:${contrastTextColor(color)}">${idx+1}</span><span class="body ${!hasNote ? 'empty' : ''}"></span>`;
      item.querySelector('.body').textContent = bodyText;
      item.addEventListener('click', () => {
        if (item.classList.contains('editing')) return;
        // delay the single-click "select" action slightly so a following
        // double-click (which edits the note) can cancel it — otherwise the
        // immediate re-render here would remove this element before the
        // dblclick event has a chance to fire on it
        clearTimeout(noteClickTimer);
        noteClickTimer = setTimeout(() => {
          selectedId = a.id;
          renderArrows(); renderList(); focusOnItem(a, entry.type);
        }, 220);
      });
      item.addEventListener('contextmenu', (e) => {
        e.preventDefault(); e.stopPropagation();
        showCtxMenu(e.clientX, e.clientY, [
          { label: t('ctxEditNote'), onClick: () => startInlineNoteEdit(item, a) }
        ]);
      });
      item.addEventListener('dblclick', (e) => {
        e.preventDefault();
        clearTimeout(noteClickTimer);
        if (item.classList.contains('editing')) return;
        startInlineNoteEdit(item, a);
      });

      // drag-and-drop reordering: grabbing the grip and dropping it on
      // another row swaps their order, which renumbers both items
      item.draggable = true;
      item.addEventListener('dragstart', (e) => {
        dragFromId = a.id;
        item.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        try { e.dataTransfer.setData('text/plain', String(a.id)); } catch(err) {}
      });
      item.addEventListener('dragend', () => {
        item.classList.remove('dragging');
        dragFromId = null;
        noteList.querySelectorAll('.note-item.drag-over').forEach(el => el.classList.remove('drag-over'));
      });
      item.addEventListener('dragover', (e) => {
        if (dragFromId == null || dragFromId === a.id) return;
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        item.classList.add('drag-over');
      });
      item.addEventListener('dragleave', () => item.classList.remove('drag-over'));
      item.addEventListener('drop', (e) => {
        e.preventDefault();
        item.classList.remove('drag-over');
        if (dragFromId == null || dragFromId === a.id) return;
        reorderItem(dragFromId, a.id);
        dragFromId = null;
      });

      noteList.appendChild(item);
    });
  }

  function startInlineNoteEdit(item, a){
    item.classList.add('editing');
    item.draggable = false;
    const bodySpan = item.querySelector('.body');
    const ta = document.createElement('textarea');
    ta.className = 'body-edit';
    ta.value = a.note || '';
    bodySpan.replaceWith(ta);
    ta.focus();
    ta.setSelectionRange(ta.value.length, ta.value.length);
    let saved = false;
    function save(){
      if (saved) return;
      saved = true;
      a.note = ta.value;
      scheduleSave();
      renderList();
    }
    ta.addEventListener('blur', save);
    ta.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') { e.stopPropagation(); saved = true; renderList(); }
    });
  }

  function focusOnItem(a){
    const rect = wrap.getBoundingClientRect();
    const c = boundsCenter(a.points);
    panX = rect.width/2 - c.x * scale;
    panY = rect.height/2 - c.y * scale;
    applyTransform();

  // ---------- popup: gradient color picker ----------
  const cpBox = document.getElementById('cpBox');
  const cpBoxThumb = document.getElementById('cpBoxThumb');
  const cpHueBar = document.getElementById('cpHueBar');
  const cpHueThumb = document.getElementById('cpHueThumb');
  const cpHex = document.getElementById('cpHex');
  const commonColorRow = document.getElementById('commonColorRow');

  let cpHue = 15, cpSat = 0.6, cpVal = 0.7;

  function hexToRgb(hex){
    hex = hex.replace('#','');
    if (hex.length === 3) hex = hex.split('').map(c => c+c).join('');
    const num = parseInt(hex, 16);
    return { r: (num >> 16) & 255, g: (num >> 8) & 255, b: num & 255 };
  }
  function rgbToHex(r,g,b){
    return '#' + [r,g,b].map(v => Math.round(Math.max(0,Math.min(255,v))).toString(16).padStart(2,'0')).join('');
  }
  function rgbToHsv(r,g,b){
    r/=255; g/=255; b/=255;
    const max = Math.max(r,g,b), min = Math.min(r,g,b), d = max - min;
    let h = 0;
    if (d !== 0) {
      if (max === r) h = ((g-b)/d) % 6;
      else if (max === g) h = (b-r)/d + 2;
      else h = (r-g)/d + 4;
      h *= 60;
      if (h < 0) h += 360;
    }
    return { h, s: max === 0 ? 0 : d/max, v: max };
  }
  function hsvToRgb(h,s,v){
    const c = v*s, x = c*(1-Math.abs((h/60)%2-1)), m = v-c;
    let r,g,b;
    if (h < 60) [r,g,b] = [c,x,0];
    else if (h < 120) [r,g,b] = [x,c,0];
    else if (h < 180) [r,g,b] = [0,c,x];
    else if (h < 240) [r,g,b] = [0,x,c];
    else if (h < 300) [r,g,b] = [x,0,c];
    else [r,g,b] = [c,0,x];
    return { r: (r+m)*255, g: (g+m)*255, b: (b+m)*255 };
  }
  function isValidHex(hex){ return /^#[0-9a-fA-F]{6}$/.test(hex); }
  function currentHex(){ const {r,g,b} = hsvToRgb(cpHue, cpSat, cpVal); return rgbToHex(r,g,b); }

  function renderCpUI(){
    cpBox.style.backgroundColor = `hsl(${cpHue}, 100%, 50%)`;
    cpBoxThumb.style.left = (cpSat*100) + '%';
    cpBoxThumb.style.top = ((1-cpVal)*100) + '%';
    cpHueThumb.style.left = (cpHue/360*100) + '%';
    cpHex.value = currentHex().toUpperCase();
  }

  function findSelected(){
    let a = arrows.find(x => x.id === selectedId);
    if (a) return { item: a, type: 'arrow' };
    a = areas.find(x => x.id === selectedId);
    if (a) return { item: a, type: 'area' };
    return null;
  }

  function applyLiveColor(){
    const hex = currentHex();
    const found = findSelected();
    if (found) { found.item.color = hex; renderArrows(); renderList(); scheduleSave(); }
    cpHex.value = hex.toUpperCase();
  }

  async function commitColor(hex){
    await addRecentColor(hex);
    renderSwatchRows(hex);
  }

  function renderSwatchRows(selectedColor){
    const sel = (selectedColor||'').toLowerCase();
    colorRow.innerHTML = '';
    recentColors.forEach(c => {
      const b = document.createElement('button');
      b.className = 'swatch' + (c.toLowerCase() === sel ? ' selected' : '');
      b.style.background = c;
      b.title = c;
      b.addEventListener('click', async () => {
        setColorFromHex(c);
        applyLiveColor();
        await commitColor(c);
      });
      colorRow.appendChild(b);
    });
    commonColorRow.innerHTML = '';
    COMMON_COLORS.forEach(c => {
      const b = document.createElement('button');
      b.className = 'swatch' + (c.toLowerCase() === sel ? ' selected' : '');
      b.style.background = c;
      b.title = c;
      b.addEventListener('click', async () => {
        setColorFromHex(c);
        applyLiveColor();
        await commitColor(c);
      });
      commonColorRow.appendChild(b);
    });
  }

  function setColorFromHex(hex){
    const {r,g,b} = hexToRgb(hex);
    const hsv = rgbToHsv(r,g,b);
    cpHue = hsv.h; cpSat = hsv.s || 0; cpVal = hsv.v || 0;
    renderCpUI();
  }

  function buildColorPicker(selectedColor){
    setColorFromHex(selectedColor || DEFAULT_COLOR);
    renderSwatchRows(selectedColor || DEFAULT_COLOR);
  }

  function boxPointToSV(clientX, clientY){
    const rect = cpBox.getBoundingClientRect();
    const x = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    const y = Math.max(0, Math.min(1, (clientY - rect.top) / rect.height));
    return { s: x, v: 1 - y };
  }
  function huePointToHue(clientX){
    const rect = cpHueBar.getBoundingClientRect();
    const x = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    return x * 360;
  }

  let cpDragTarget = null;
  cpBox.addEventListener('pointerdown', (e) => {
    cpDragTarget = 'box';
    const {s,v} = boxPointToSV(e.clientX, e.clientY);
    cpSat = s; cpVal = v;
    renderCpUI(); applyLiveColor();
    cpBox.setPointerCapture(e.pointerId);
  });
  cpHueBar.addEventListener('pointerdown', (e) => {
    cpDragTarget = 'hue';
    cpHue = huePointToHue(e.clientX);
    renderCpUI(); applyLiveColor();
    cpHueBar.setPointerCapture(e.pointerId);
  });
  window.addEventListener('pointermove', (e) => {
    if (!cpDragTarget) return;
    if (cpDragTarget === 'box') {
      const {s,v} = boxPointToSV(e.clientX, e.clientY);
      cpSat = s; cpVal = v;
    } else {
      cpHue = huePointToHue(e.clientX);
    }
    renderCpUI(); applyLiveColor();
  });
  window.addEventListener('pointerup', async () => {
    if (!cpDragTarget) return;
    cpDragTarget = null;
    await commitColor(currentHex());
  });

  cpHex.addEventListener('keydown', (e) => { if (e.key === 'Enter') cpHex.blur(); });
  cpHex.addEventListener('blur', async () => {
    let hex = cpHex.value.trim();
    if (hex && hex[0] !== '#') hex = '#' + hex;
    if (!isValidHex(hex)) { cpHex.value = currentHex().toUpperCase(); return; }
    setColorFromHex(hex);
    applyLiveColor();
    await commitColor(hex);
  });

  const bidirWrap = document.getElementById('bidirWrap');
  const bidirCheck = document.getElementById('bidirCheck');
  const thinWrap = document.getElementById('thinWrap');
  const thinCheck = document.getElementById('thinCheck');

  function openPopupCommon(id, type, item){
    if (editShapeId != null) exitShapeEdit();
    selectedId = id;
    noteText.value = item.note || '';
    noteText.placeholder = type === 'area' ? t('areaNotePlaceholder') : t('notePlaceholder');
    buildColorPicker(item.color || DEFAULT_COLOR);
    if (type === 'arrow') {
      bidirWrap.style.display = 'flex';
      bidirCheck.checked = !!item.bidirectional;
    } else {
      bidirWrap.style.display = 'none';
    }
    // thin-line toggle applies to both arrows and areas
    thinWrap.style.display = 'flex';
    document.getElementById('thinLabel').textContent = thinDefault ? t('thinLabelThick') : t('thinLabel');
    // when "thin by default" is on, this checkbox instead offers a per-item
    // override to make just this one thicker again
    thinCheck.checked = thinDefault ? !item.thin : !!item.thin;
    popup.style.display = 'block';
    positionPopup(item, type);
    renderArrows(); renderList();
    noteText.focus();
  }
  function findById(id){
    let a = arrows.find(x => x.id === id);
    if (a) return { item: a, type: 'arrow' };
    a = areas.find(x => x.id === id);
    if (a) return { item: a, type: 'area' };
    return null;
  }
  function openPopupFor(id){
    const found = findById(id);
    if (!found) return;
    if (selectedId !== id) pushUndo();
    openPopupCommon(id, found.type, found.item);
  }
  function openPopupForNoHistory(id){
    const found = findById(id);
    if (!found) return;
    openPopupCommon(id, found.type, found.item);
  }

  bidirCheck.addEventListener('change', () => {
    const found = findSelected();
    if (found && found.type === 'arrow') {
      found.item.bidirectional = bidirCheck.checked;
      renderArrows(); scheduleSave();
    }
  });

  thinCheck.addEventListener('change', () => {
    const found = findSelected();
    if (found) {
      // when thin-by-default is on, a checked box means "make this one thick"
      found.item.thin = thinDefault ? !thinCheck.checked : thinCheck.checked;
      renderArrows(); scheduleSave();
    }
  });

  function positionPopup(item, type){
    const rect = wrap.getBoundingClientRect();
    const ref = type === 'area' ? boundsCenter(item.points) : item.points[item.points.length - 1];
    const midX = ref.x * scale + panX;
    const midY = ref.y * scale + panY;
    // measure the popup's actual rendered size (it must already be display:block)
    // instead of relying on stale hardcoded numbers, so it never gets clipped
    // at the bottom of the window when its content grows (e.g. new checkboxes)
    const popW = popup.offsetWidth || 280;
    const popH = popup.offsetHeight || 420;
    let left = midX + 16, top = midY - 20;
    if (left + popW > rect.width) left = midX - popW - 10;
    if (left + popW > rect.width) left = Math.max(10, rect.width - popW - 10);
    if (left < 0) left = 10;
    if (top + popH > rect.height) top = Math.max(10, rect.height - popH - 10);
    if (top < 0) top = 10;
    popup.style.left = left + 'px';
    popup.style.top = top + 'px';
  }

  function closePopup(save){
    if (save && selectedId != null) {
      const found = findSelected();
      if (found) { found.item.note = noteText.value; scheduleSave(); }
    }
    popup.style.display = 'none';
    renderArrows(); renderList();
  }

  document.getElementById('closePopupBtn').addEventListener('click', () => closePopup(true));
  document.getElementById('editShapeBtn').addEventListener('click', () => {
    if (selectedId != null) enterShapeEdit(selectedId);
  });
  document.getElementById('deleteArrowBtn').addEventListener('click', () => {
    pushUndo();
    arrows = arrows.filter(a => a.id !== selectedId);
    areas = areas.filter(a => a.id !== selectedId);

  // ---------- zoom ----------
  function zoomAt(clientX, clientY, factor){
    const rect = wrap.getBoundingClientRect();
    const localX = clientX - rect.left, localY = clientY - rect.top;
    const worldX = (localX - panX) / scale, worldY = (localY - panY) / scale;
    scale = Math.min(8, Math.max(0.1, scale * factor));
    panX = localX - worldX * scale;
    panY = localY - worldY * scale;
    applyTransform();
    if (isDrawingPath) drawPreview();
    if (isDrawingArea) drawAreaPreview();
  }
  document.getElementById('zoomIn').addEventListener('click', () => {
    const r = wrap.getBoundingClientRect();
    zoomAt(r.left + r.width/2, r.top + r.height/2, 1.25);
  });
  document.getElementById('zoomOut').addEventListener('click', () => {

    zoomAt(r.left + r.width/2, r.top + r.height/2, 0.8);
  });
  document.getElementById('zoomReset').addEventListener('click', () => {
    scale = 1; panX = 0; panY = 0; applyTransform();
  });
  wrap.addEventListener('wheel', (e) => {

  // ---------- pan + ctrl-based polyline drawing + shift-based area drawing ----------
  let isPanning = false, panStart = {x:0,y:0}, panOrigin = {x:0,y:0};
  let isDrawingPath = false;
  let currentPoints = [];
  let tempGroup = null;
  let isDrawingArea = false;
  let areaPoints = [];
  let tempAreaGroup = null;
  const AREA_CLOSE_PX = 16; // screen-pixel radius around the first point that closes the area

  function inChrome(e){ return e.target.closest('#toolbar') || e.target.closest('#popup'); }

  wrap.addEventListener('mousedown', (e) => {
    if (inChrome(e)) return;
    if (e.button === 2) return;
    if (popup.style.display === 'block') closePopup(true);
    if (editShapeId != null && !e.target.closest('.vertex-handle') && !e.target.closest('.label-handle')) exitShapeEdit();
    if (e.ctrlKey || e.metaKey || e.shiftKey) return;
    isPanning = true;
    wrap.classList.add('panning');
    panStart = {x: e.clientX, y: e.clientY};
    panOrigin = {x: panX, y: panY};
  });

  wrap.addEventListener('click', (e) => {
    if (inChrome(e)) return;
    if (e.ctrlKey || e.metaKey) {
      e.preventDefault();
      const wc = toWorldCoords(e.clientX, e.clientY);
      if (!isDrawingPath) {
        isDrawingPath = true;
        currentPoints = [wc];
        drawPreview();
      } else {
        currentPoints.push(wc);
        finalizeArrow();
      }
      return;
    }
    if (e.shiftKey) {
      e.preventDefault();
      const wc = toWorldCoords(e.clientX, e.clientY);
      if (!isDrawingArea) {
        isDrawingArea = true;
        areaPoints = [wc];
        drawAreaPreview();
      } else {
        const first = areaPoints[0];
        const screenDist = Math.hypot((wc.x - first.x) * scale, (wc.y - first.y) * scale);
        if (areaPoints.length >= 3 && screenDist <= AREA_CLOSE_PX) {
          finalizeArea();
        } else {
          areaPoints.push(wc);
          drawAreaPreview();
        }
      }
      return;
    }
  });

  wrap.addEventListener('contextmenu', (e) => {

  let hoverPoint = null;
  function drawPreview(){
    removeTempPath();
    const pts = hoverPoint ? [...currentPoints, hoverPoint] : currentPoints;
    if (pts.length < 1) return;
    tempGroup = document.createElementNS('http://www.w3.org/2000/svg','g');
    if (pts.length > 1) {
      const line = document.createElementNS('http://www.w3.org/2000/svg','path');
      line.setAttribute('d', pathData(pts));
      line.setAttribute('stroke', DEFAULT_COLOR);
      line.setAttribute('stroke-width', '4');
      line.setAttribute('stroke-dasharray', '6 4');
      line.setAttribute('fill', 'none');
      line.setAttribute('marker-end', 'url(#arrowhead-' + colorId(DEFAULT_COLOR) + ')');
      tempGroup.appendChild(line);
    }
    currentPoints.forEach((p, i) => {
      const dot = document.createElementNS('http://www.w3.org/2000/svg','circle');
      dot.setAttribute('cx', p.x); dot.setAttribute('cy', p.y);
      dot.setAttribute('r', i===0 ? 6 : 3.5);
      dot.setAttribute('fill', DEFAULT_COLOR);
      dot.setAttribute('opacity', '0.85');
      tempGroup.appendChild(dot);
    });
    svg.appendChild(tempGroup);
  }
  function removeTempPath(){ if (tempGroup) { tempGroup.remove(); tempGroup = null; } }
  function cancelDrawing(){
    isDrawingPath = false;
    currentPoints = [];
    hoverPoint = null;
    removeTempPath();
  }

  function finalizeArrow(){
    const pts = currentPoints;
    isDrawingPath = false;
    hoverPoint = null;
    removeTempPath();

    const id = idCounter++;
    const color = recentColors[0] || DEFAULT_COLOR;

  // ---------- area (shift+click) drawing preview / finalize ----------
  function drawAreaPreview(){
    removeTempAreaPath();
    const pts = hoverPoint ? [...areaPoints, hoverPoint] : areaPoints;
    if (pts.length < 1) return;
    tempAreaGroup = document.createElementNS('http://www.w3.org/2000/svg','g');
    const color = recentColors[0] || DEFAULT_COLOR;

    // highlight the closing target once we have enough points to close
    let nearClose = false;
    if (areaPoints.length >= 3 && hoverPoint) {
      const first = areaPoints[0];
      const screenDist = Math.hypot((hoverPoint.x - first.x) * scale, (hoverPoint.y - first.y) * scale);
      nearClose = screenDist <= AREA_CLOSE_PX;
    }

    if (pts.length > 1) {
      const line = document.createElementNS('http://www.w3.org/2000/svg','path');
      line.setAttribute('d', pathData(pts));
      line.setAttribute('stroke', nearClose ? '#1e8e4a' : color);
      line.setAttribute('stroke-width', '3');
      line.setAttribute('stroke-dasharray', '6 4');
      line.setAttribute('fill', 'none');
      tempAreaGroup.appendChild(line);

    areaPoints.forEach((p, i) => {
      const dot = document.createElementNS('http://www.w3.org/2000/svg','circle');
      dot.setAttribute('cx', p.x); dot.setAttribute('cy', p.y);
      dot.setAttribute('r', i === 0 ? 9 : 3.5);
      dot.setAttribute('fill', i === 0 ? (nearClose ? '#1e8e4a' : '#fff') : color);
      dot.setAttribute('stroke', color);
      dot.setAttribute('stroke-width', i === 0 ? 3 : 0);
      dot.setAttribute('opacity', '0.9');
      tempAreaGroup.appendChild(dot);
    });
    svg.appendChild(tempAreaGroup);
  }
  function removeTempAreaPath(){ if (tempAreaGroup) { tempAreaGroup.remove(); tempAreaGroup = null; } }
  function cancelAreaDrawing(){
    isDrawingArea = false;

  }

  // ---------- PNG export: notes-panel layout helpers ----------
  const PNG_EXPORT_FONT = '"Hiragino Sans","Yu Gothic","Segoe UI",sans-serif';

  // greedy word-wrap that also falls back to character-wrapping for runs
  // (like Japanese text) that contain no spaces to break on
  function wrapTextForCanvas(ctx, text, maxWidth){
    const paragraphs = String(text).split('\n');
    const lines = [];
    paragraphs.forEach(para => {
      if (para.length === 0) { lines.push(''); return; }
      const words = para.split(' ');
      let current = '';
      words.forEach(word => {
        const candidate = current ? current + ' ' + word : word;
        if (ctx.measureText(candidate).width <= maxWidth) {
          current = candidate;
          return;
        }
        if (current) lines.push(current);
        if (ctx.measureText(word).width <= maxWidth) {
          current = word;
          return;
        }
        let sub = '';
        for (const ch of word) {
          const test = sub + ch;
          if (ctx.measureText(test).width > maxWidth && sub) {
            lines.push(sub);
            sub = ch;
          } else {
            sub = test;
          }
        }
        current = sub;
      });
      if (current) lines.push(current);
    });
    return lines;
  }

  function roundedRectPath(ctx, x, y, w, h, r){
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  // draws the map canvas plus a notes list to its right, and returns the
  // combined canvas. Splits into two balanced columns when the single-column
  // list would run much taller than the map image; if even two columns don't
  // fit within the map's height, the text/badges are shrunk (down to a
  // legibility floor) so the overall image height never has to grow.
  function composeCanvasWithNotes(mapCanvas, w, h){
    const PADDING = 26;
    const COL_GAP = 30;
    const COL_TEXT_WIDTH = 300;
    const BADGE_GAP = 12;
    const TITLE_SIZE = 20;
    const TITLE_GAP = 22;
    const TEXT_COLOR = '#2b2a26';
    const MUTED_COLOR = '#8a8578';
    const SEPARATOR_COLOR = '#ddd9cf';

    const BASE_FONT = 15, BASE_LINE = 21, BASE_GAP = 18, BASE_BADGE = 26, BASE_BADGE_FONT = 13;
    const MIN_SCALE = 0.55; // legibility floor (~8px note text)
    const SCALE_STEP = 0.05;

    const measure = document.createElement('canvas').getContext('2d');
    const nums = numberMap();
    const rawEntries = combinedSorted();

    function computeItemsAtScale(scale){
      const fontSize = Math.max(8, Math.round(BASE_FONT * scale));
      const lineHeight = Math.max(11, Math.round(BASE_LINE * scale));
      const itemGap = Math.max(6, Math.round(BASE_GAP * scale));
      const badgeD = Math.max(15, Math.round(BASE_BADGE * scale));
      const badgeFont = Math.max(8, Math.round(BASE_BADGE_FONT * scale));
      measure.font = fontSize + 'px ' + PNG_EXPORT_FONT;
      const items = rawEntries.map(entry => {
        const ref = entry.ref;
        const color = ref.color || DEFAULT_COLOR;
        const hasNote = !!(ref.note && ref.note.trim());
        const lines = wrapTextForCanvas(measure, hasNote ? ref.note.trim() : t('noNote'), COL_TEXT_WIDTH);
        const height = Math.max(badgeD, Math.max(lines.length, 1) * lineHeight);
        return { num: nums[ref.id], color, type: entry.type, lines, hasNote, height };
      });
      return { items, fontSize, lineHeight, itemGap, badgeD, badgeFont };
    }

    const totalHeightOf = (list, gap) => list.reduce((s, it) => s + it.height + gap, 0);
    const availableH = h - PADDING*2 - TITLE_SIZE - TITLE_GAP;

    function splitIntoColumns(items, itemGap, count){
      if (count === 1 || items.length === 0) return [items];
      const total = totalHeightOf(items, itemGap);
      const target = total / 2;
      let acc = 0, splitIdx = items.length;
      for (let i = 0; i < items.length; i++) {
        acc += items[i].height + itemGap;
        if (acc >= target) { splitIdx = i + 1; break; }
      }
      splitIdx = Math.min(Math.max(splitIdx, 1), items.length - 1);
      return [items.slice(0, splitIdx), items.slice(splitIdx)];
    }

    // 1) decide column count (1 or 2) at normal (unscaled) size
    const baseline = computeItemsAtScale(1);
    let colCount;
    if (baseline.items.length === 0 || baseline.items.length <= 4) {
      colCount = 1;
    } else if (totalHeightOf(baseline.items, baseline.itemGap) <= availableH) {
      colCount = 1;
    } else {
      colCount = 2;
    }

    // 2) with that column count fixed, find the largest scale (<=1) that fits
    // within the map's height; shrinking text/badges instead of growing the
    // canvas. Falls back to the smallest scale (image grows) only if even
    // the legibility floor can't fit everything.
    let layout = null;
    for (let s = 1; s >= MIN_SCALE - 1e-9; s -= SCALE_STEP) {
      const computed = computeItemsAtScale(s);
      const columns = splitIntoColumns(computed.items, computed.itemGap, colCount);
      const maxColHeight = Math.max(0, ...columns.map(c => totalHeightOf(c, computed.itemGap)));
      layout = { ...computed, columns, maxColHeight };
      if (maxColHeight <= availableH || s <= MIN_SCALE) break;
    }

    const { fontSize, lineHeight, itemGap, badgeD, badgeFont, columns, maxColHeight } = layout;
    const colWidth = badgeD + BADGE_GAP + COL_TEXT_WIDTH;
    const panelWidth = PADDING*2 + colCount*colWidth + (colCount - 1)*COL_GAP;
    const panelHeight = PADDING*2 + TITLE_SIZE + TITLE_GAP + maxColHeight;

    const finalW = w + panelWidth;
    const finalH = Math.max(h, panelHeight);

    const finalCanvas = document.createElement('canvas');
    finalCanvas.width = finalW; finalCanvas.height = finalH;
    const ctx = finalCanvas.getContext('2d');
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, finalW, finalH);
    ctx.drawImage(mapCanvas, 0, 0);

    ctx.strokeStyle = SEPARATOR_COLOR;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(w + 0.5, 0);
    ctx.lineTo(w + 0.5, finalH);
    ctx.stroke();

    ctx.fillStyle = TEXT_COLOR;
    ctx.font = 'bold ' + TITLE_SIZE + 'px ' + PNG_EXPORT_FONT;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'alphabetic';
    ctx.fillText(t('sidebarHeader'), w + PADDING, PADDING + TITLE_SIZE - 4);

    const badgeRadius = Math.max(4, Math.round(badgeD * 0.23));
    const topY = PADDING + TITLE_SIZE + TITLE_GAP;
    columns.forEach((col, colIdx) => {
      const colX = w + PADDING + colIdx*(colWidth + COL_GAP);
      let y = topY;
      col.forEach(item => {
        const badgeCx = colX + badgeD/2;
        const badgeCy = y + item.height/2;
        const textX = colX + badgeD + BADGE_GAP;

        ctx.fillStyle = item.color;
        if (item.type === 'area') {
          roundedRectPath(ctx, colX, badgeCy - badgeD/2, badgeD, badgeD, badgeRadius);
          ctx.fill();
        } else {
          ctx.beginPath();
          ctx.arc(badgeCx, badgeCy, badgeD/2, 0, Math.PI*2);
          ctx.fill();
        }
        ctx.fillStyle = contrastTextColor(item.color);
        ctx.font = 'bold ' + badgeFont + 'px ' + PNG_EXPORT_FONT;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(String(item.num), badgeCx, badgeCy + 1);

        ctx.textAlign = 'left';
        ctx.textBaseline = 'alphabetic';
        ctx.font = (item.hasNote ? '' : 'italic ') + fontSize + 'px ' + PNG_EXPORT_FONT;
        ctx.fillStyle = item.hasNote ? TEXT_COLOR : MUTED_COLOR;
        const blockHeight = item.lines.length * lineHeight;
        const offsetY = (item.height - blockHeight) / 2;
        item.lines.forEach((line, li) => {
          ctx.fillText(line, textX, y + offsetY + (li + 1)*lineHeight - Math.round(lineHeight*0.28));
        });

        y += item.height + itemGap;
      });
    });

    return finalCanvas;
  }

  async function performPngExport(includeNotes){
    const {w,h} = worldSize();
    const mapCanvas = document.createElement('canvas');
    mapCanvas.width = w; mapCanvas.height = h;
    const ctx = mapCanvas.getContext('2d');
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, w, h);
    try {
      if (imgDataUrl) {
        const img = await loadImageAsync(imgDataUrl);
        ctx.drawImage(img, 0, 0, w, h);
      }
      // hide the vertex/label edit handles for a clean export, then restore
      const wasEditing = editShapeId;
      editShapeId = null;
      renderArrows();
      // the SVG is exported as a standalone document (Blob -> <img>), which has
      // no access to the page's <style> stylesheet. Without it, classes like
      // .arrow-shaft and .arrow-num fall back to SVG defaults (fill:black,
      // stroke-width:1, default text anchoring), producing filled black
      // wedges, hairline strokes, and mis-positioned number labels. Embedding
      // the needed rules directly in the SVG makes it self-contained.
      const exportStyle = document.createElementNS('http://www.w3.org/2000/svg', 'style');
      exportStyle.textContent = `
        .arrow-hit { fill: none; }
        .arrow-shaft { stroke-width: 4; fill: none; stroke-linejoin: round; stroke-linecap: round; }
        .arrow-shaft.selected { stroke-width: 5; }
        .arrow-num { fill: #fff; font-size: 11px; font-weight: 700; text-anchor: middle; dominant-baseline: central; }
        .bend-dot { fill: #fff; }
      `;
      svg.insertBefore(exportStyle, svg.firstChild);
      const svgString = new XMLSerializer().serializeToString(svg);
      const svgBlob = new Blob([svgString], {type: 'image/svg+xml;charset=utf-8'});
      const svgUrl = URL.createObjectURL(svgBlob);
      const svgImg = await loadImageAsync(svgUrl);
      ctx.drawImage(svgImg, 0, 0, w, h);
      URL.revokeObjectURL(svgUrl);
      editShapeId = wasEditing;
      renderArrows();

      const finalCanvas = includeNotes ? composeCanvasWithNotes(mapCanvas, w, h) : mapCanvas;

      finalCanvas.toBlob((blob) => {
        if (!blob) { showToast(t('toastPngExportFailed')); return; }
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        const f = files.find(x => x.id === currentFileId);
        a.download = 'arrowmap-' + (f ? f.name : 'memo') + '-' + new Date().toISOString().slice(0,10) + '.png';
        a.click();
        URL.revokeObjectURL(url);
        showToast(t('toastPngExported'));
      }, 'image/png');
    } catch(err) {
      console.error('PNG export failed', err);
      showToast(t('toastPngExportFailed'));
    }
  }

  document.getElementById('importInput').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        pushUndo();
        arrows = (data.arrows || []).map(a => {
          if (a.points) return {...a, color: a.color || DEFAULT_COLOR, bidirectional: !!a.bidirectional};
          return {id: a.id, points: [{x:a.x1,y:a.y1},{x:a.x2,y:a.y2}], note: a.note || '', color: a.color || DEFAULT_COLOR, bidirectional: false};
        });
        areas = (data.areas || []).map(a => ({...a, color: a.color || DEFAULT_COLOR}));
        idCounter = Math.max(
          arrows.reduce((m,a) => Math.max(m, a.id), 0),
          areas.reduce((m,a) => Math.max(m, a.id), 0)
        ) + 1;
        if (data.image) setImage(data.image, false);
        renderArrows(); renderList(); scheduleSave();
        showToast(t('toastImported'));
      } catch(err) { showToast(t('toastImportFailed')); }
    };
    reader.readAsText(file);
    e.target.value = '';
  });

  document.getElementById('clearBtn').addEventListener('click', () => {
    if (!confirm(t('confirmClear'))) return;
    pushUndo();
    arrows = [];
    areas = [];
    selectedId = null;
    popup.style.display = 'none';
    renderArrows(); renderList(); scheduleSave();
    showToast(t('toastCleared'));
  });

  // ---------- init ----------
  async function init(){
    try {
      const langRes = await storage.get(KEY_LANG);
      if (langRes && langRes.value) lang = langRes.value;
    } catch(e) {}
    try {
      const themeRes = await storage.get(KEY_THEME);
      applyTheme((themeRes && themeRes.value) || 'light');
    } catch(e) { applyTheme('light'); }
    try {
      const thinRes = await storage.get(KEY_THIN_DEFAULT);
      thinDefault = !!(thinRes && thinRes.value === '1');
    } catch(e) { thinDefault = false; }
    await loadRecentColors();
    applyTransform();
    await loadFilesList();
    populateFileSelect();
    await loadFileData(currentFileId);
    applyLanguage();
  }
  init();
})();
</script>
</body>
</html>
