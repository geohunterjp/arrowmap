<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ArrowMap by GeoHunter.jp</title>
<style>
  :root {
    --bg: #f4f3ef;
    --panel: #ffffff;
    --border: #ddd9cf;
    --border-strong: #c7c2b4;
    --text: #2b2a26;
    --text-muted: #8a8578;
    --accent: #b5502e;
    --accent-soft: #f2e2da;
  }
  html[data-theme="dark"] {
    --bg: #1c1b18;
    --panel: #26251f;
    --border: #3c3a33;
    --border-strong: #504e44;
    --text: #ece7db;
    --text-muted: #9d9789;
    --accent: #e08256;
    --accent-soft: #3d2c22;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: "Hiragino Sans", "Yu Gothic", "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
  }
  #app { display: flex; height: 100vh; width: 100vw; }
  #toolbar {
    position: absolute;
    top: 12px; left: 12px; right: 12px;
    z-index: 20;
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 10px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.14);
    flex-wrap: wrap;
  }
  .btn {
    background: var(--panel);
    border: 1px solid var(--border-strong);
    border-radius: 7px;
    padding: 7px 12px;
    font-size: 13px;
    color: var(--text);
    cursor: pointer;
    white-space: nowrap;
  }
  .btn:hover { filter: brightness(0.97); }
  html[data-theme="dark"] .btn:hover { filter: brightness(1.15); }
  .btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn:disabled { opacity: 0.4; cursor: default; }
  .sep { width: 1px; height: 22px; background: var(--border-strong); margin: 0 2px; }
  #title { font-size: 14px; font-weight: 700; margin-right: 4px; color: var(--accent); white-space: nowrap; }
  #fileSelect {
    font-size: 13px;
    padding: 6px 8px;
    border-radius: 7px;
    border: 1px solid var(--border-strong);
    background: var(--panel);
    color: var(--text);
    max-width: 150px;
  }
  #hint { font-size: 12px; color: var(--text-muted); margin-left: auto; white-space: nowrap; }
  #settingsWrap { position: relative; flex: none; }
  #settingsBtn { font-size: 15px; padding: 6px 10px; line-height: 1; }
  #settingsMenu {
    position: absolute; top: calc(100% + 6px); right: 0;
    background: var(--panel); border: 1px solid var(--border-strong);
    border-radius: 9px; box-shadow: 0 4px 16px rgba(0,0,0,0.22);
    padding: 6px; display: none; flex-direction: column; gap: 4px;
    z-index: 50; min-width: 130px;
  }
  #settingsMenu.open { display: flex; }
  #settingsMenu .btn { width: 100%; text-align: left; }
  #canvasWrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    background-color: var(--bg);
    cursor: grab;
  }
  html:not([data-theme="dark"]) #canvasWrap {
    background-image:
      linear-gradient(45deg, #eae8e1 25%, transparent 25%) -20px 0,
      linear-gradient(-45deg, #eae8e1 25%, transparent 25%) -20px 0,
      linear-gradient(45deg, transparent 75%, #eae8e1 75%),
      linear-gradient(-45deg, transparent 75%, #eae8e1 75%);
    background-size: 40px 40px;
  }
  html[data-theme="dark"] #canvasWrap {
    background-image:
      linear-gradient(45deg, #252420 25%, transparent 25%) -20px 0,
      linear-gradient(-45deg, #252420 25%, transparent 25%) -20px 0,
      linear-gradient(45deg, transparent 75%, #252420 75%),
      linear-gradient(-45deg, transparent 75%, #252420 75%);
    background-size: 40px 40px;
  }
  #canvasWrap.panning { cursor: grabbing; }
  #canvasWrap.ctrlActive { cursor: crosshair; }
  #canvasWrap.shiftActive { cursor: cell; }
  #world { position: absolute; top: 0; left: 0; transform-origin: 0 0; }
  #bgImg { display: block; max-width: none; pointer-events: none; user-select: none; }
  #placeholder {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center; color: var(--text-muted); font-size: 14px; width: 320px;
    pointer-events: none;
  }
  svg#arrowLayer { position: absolute; top: 0; left: 0; overflow: visible; pointer-events: none; }
  .arrow-hit { pointer-events: stroke; cursor: pointer; stroke: transparent; stroke-width: 16; fill: none; }
  .arrow-shaft { stroke-width: 4; fill: none; pointer-events: none; stroke-linejoin: round; stroke-linecap: round; }
  .arrow-shaft.selected { stroke-width: 5; }
  .arrow-num { fill: #fff; font-size: 11px; font-weight: 700; pointer-events: none; text-anchor: middle; dominant-baseline: central; }
  .arrow-num-bg { pointer-events: none; }
  .arrow-num-bg.selected { stroke: #1e6e4a; stroke-width: 2; }
  .bend-dot { fill: #fff; pointer-events: none; }
  .area-shape { pointer-events: all; cursor: pointer; }
  .area-shape.selected { stroke-width: 3.5 !important; }
  .area-num-bg { pointer-events: none; }
  .area-num-bg.selected { stroke: #1e6e4a; stroke-width: 2; }

  #sidebar { width: 300px; background: var(--panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; z-index: 15; }
  #sidebarHeader { padding: 12px 14px 8px; border-bottom: 1px solid var(--border); font-size: 13px; color: var(--text-muted); }
  #noteList { flex: 1; overflow-y: auto; padding: 6px; }
  .note-item { padding: 8px 10px; border-radius: 8px; margin-bottom: 4px; cursor: pointer; border: 1px solid transparent; font-size: 13px; display: flex; gap: 8px; align-items: flex-start; }
  .note-item:hover { background: var(--accent-soft); }
  .note-item.selected { background: var(--accent-soft); border-color: var(--accent); }
  .note-item .num {
    flex: none;
    display: inline-flex; align-items: center; justify-content: center;
    width: 18px; height: 18px; border-radius: 50%; color: #fff; font-size: 10px; margin-top: 1px;
  }
  .note-item .num.square { border-radius: 5px; }
  .note-item .body { color: var(--text); white-space: pre-wrap; word-break: break-word; }
  .note-item .empty { color: var(--text-muted); font-style: italic; }
  #emptyList { padding: 20px 14px; color: var(--text-muted); font-size: 13px; line-height: 1.6; }

  #popup {
    position: absolute; z-index: 30;
    background: var(--panel);
    border: 1px solid var(--border-strong);
    border-radius: 10px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.25);
    padding: 10px;
    width: 260px;
    max-height: 88vh;
    overflow-y: auto;
    display: none;
  }
  #popup textarea {
    width: 100%; height: 70px; resize: vertical;
    font-family: inherit; font-size: 13px;
    border: 1px solid var(--border); border-radius: 6px; padding: 6px;
    background: var(--bg); color: var(--text);
  }
  #bidirWrap { display: flex; align-items: center; gap: 6px; margin-top: 8px; font-size: 12px; color: var(--text); }
  #bidirWrap input { margin: 0; }
  #colorSection { margin-top: 10px; }
  #cpHeaderRow { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  #cpHeaderRow .cpHeaderLabel { font-size: 12px; color: var(--text-muted); }
  #cpHex {
    width: 84px; font-size: 12px; font-family: monospace; text-align: center;
    padding: 4px 5px; border-radius: 6px; border: 1px solid var(--border-strong);
    background: var(--bg); color: var(--text); text-transform: uppercase;
  }
  #cpBox {
    position: relative; width: 100%; height: 110px; border-radius: 8px;
    cursor: crosshair; margin-bottom: 8px; border: 1px solid var(--border-strong);
    touch-action: none; overflow: hidden;
  }
  #cpBox .cpLayerWhite { position: absolute; inset: 0; background: linear-gradient(to right, #fff, rgba(255,255,255,0)); }
  #cpBox .cpLayerBlack { position: absolute; inset: 0; background: linear-gradient(to top, #000, rgba(0,0,0,0)); }
  #cpBoxThumb {
    position: absolute; width: 14px; height: 14px; border-radius: 50%;
    border: 2px solid #fff; box-shadow: 0 0 0 1px rgba(0,0,0,0.35), 0 1px 3px rgba(0,0,0,0.4);
    transform: translate(-50%, -50%); pointer-events: none;
  }
  #cpHueBar {
    position: relative; width: 100%; height: 14px; border-radius: 7px;
    margin-bottom: 10px; cursor: pointer; touch-action: none;
    background: linear-gradient(to right, #f00, #ff0, #0f0, #0ff, #00f, #f0f, #f00);
    border: 1px solid var(--border-strong);
  }
  #cpHueThumb {
    position: absolute; top: 50%; width: 16px; height: 16px; border-radius: 50%;
    border: 2px solid #fff; box-shadow: 0 0 0 1px rgba(0,0,0,0.35), 0 1px 3px rgba(0,0,0,0.4);
    transform: translate(-50%, -50%); pointer-events: none; background: transparent;
  }
  .colorGroupLabel { font-size: 11px; color: var(--text-muted); margin-top: 6px; margin-bottom: 4px; }
  #colorRow, #commonColorRow { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  #commonColorRow { margin-bottom: 2px; }
  .swatch {
    width: 20px; height: 20px; border-radius: 50%;
    border: 2px solid transparent; cursor: pointer; padding: 0;
  }
  .swatch.selected { border-color: var(--text); }
  #colorLabel { font-size: 12px; color: var(--text-muted); }
  #popup .row { display: flex; justify-content: space-between; margin-top: 8px; gap: 6px; }
  #popup .row .btn { flex: 1; text-align: center; font-size: 12px; padding: 6px; }
  #popup .del { color: #c0392b; border-color: #d9b3ab; }

  #fileInput, #importInput { display: none; }

  #toast {
    position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
    background: var(--text); color: var(--bg); padding: 7px 14px; border-radius: 20px; font-size: 12px;
    opacity: 0; transition: opacity 0.25s; pointer-events: none; z-index: 40;
  }
  #toast.show { opacity: 0.92; }
  #hoverTip {
    position: fixed;
    display: none;
    max-width: 260px;
    background: rgba(20,20,20,0.92);
    color: #fff;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 12px;
    line-height: 1.45;
    white-space: pre-wrap;
    word-break: break-word;
    pointer-events: none;
    z-index: 9999;
    box-shadow: 0 2px 8px rgba(0,0,0,0.35);
  }
</style>
</head>
<body>
<div id="app">
  <div id="canvasWrap">
    <div id="toolbar">
      <span id="title">ArrowMap</span>
      <select id="fileSelect"></select>
      <button class="btn" id="newFileBtn"></button>
      <button class="btn" id="renameFileBtn"></button>
      <button class="btn" id="deleteFileBtn"></button>
      <div class="sep"></div>
      <button class="btn" id="loadBtn"></button>
      <div class="sep"></div>
      <button class="btn" id="undoBtn"></button>
      <button class="btn" id="redoBtn"></button>
      <div class="sep"></div>
      <button class="btn" id="zoomOut">－</button>
      <button class="btn" id="zoomReset">100%</button>
      <button class="btn" id="zoomIn">＋</button>
      <div class="sep"></div>
      <button class="btn" id="exportBtn"></button>
      <button class="btn" id="importBtn"></button>
      <button class="btn" id="clearBtn"></button>
      <span id="hint"></span>
      <div id="settingsWrap">
        <button class="btn" id="settingsBtn" title="Settings">⚙</button>
        <div id="settingsMenu">
          <button class="btn" id="themeToggle"></button>
          <button class="btn" id="langToggle"></button>
        </div>
      </div>
    </div>
    <div id="canvasWrap2" style="position:absolute; inset:0;">
      <div id="world">
        <img id="bgImg" src="" style="display:none;">
        <svg id="arrowLayer" width="1" height="1"></svg>
      </div>
      <div id="placeholder"></div>
    </div>
    <div id="popup">
      <textarea id="noteText"></textarea>
      <div id="colorSection">
        <div id="cpHeaderRow">
          <span class="cpHeaderLabel" id="colorLabel"></span>
          <input type="text" id="cpHex" maxlength="7">
        </div>
        <div id="cpBox">
          <div class="cpLayerWhite"></div>
          <div class="cpLayerBlack"></div>
          <div id="cpBoxThumb"></div>
        </div>
        <div id="cpHueBar">
          <div id="cpHueThumb"></div>
        </div>
        <div class="colorGroupLabel" id="quickAccessLabel"></div>
        <div id="colorRow"></div>
        <div class="colorGroupLabel" id="commonLabel"></div>
        <div id="commonColorRow"></div>
      </div>
      <div id="bidirWrap">
        <input type="checkbox" id="bidirCheck">
        <label for="bidirCheck" id="bidirLabel"></label>
      </div>
      <div class="row">
        <button class="btn del" id="deleteArrowBtn"></button>
        <button class="btn" id="closePopupBtn"></button>
      </div>
    </div>
    <div id="toast"></div>
    <div id="hoverTip"></div>
  </div>
  <div id="sidebar">
    <div id="sidebarHeader"></div>
    <div id="noteList"></div>
  </div>
</div>
<input type="file" id="fileInput" accept="image/*">
<input type="file" id="importInput" accept="application/json">
<script>
(function(){
  // ---------- i18n ----------
  const STRINGS = {
    ja: {
      title: 'ArrowMap by GeoHunter.jp',
      newFile: '＋新規', rename: '名前変更', deleteFile: 'ファイル削除',
      loadImage: '画像を読み込む',
      undo: '戻る', redo: '進む',
      exportBtn: '書き出し', importBtn: '読み込み(JSON)', clearBtn: 'メモを全消去',
      themeToDark: 'ダークモード', themeToLight: 'ライトモード',
      langToggle: 'English',
      hint: 'Ctrl+クリック：矢印　Ctrl+右クリック：矢印を曲げる　Shift+クリック：エリア（面）　それ以外のドラッグ：地図移動',
      placeholder: '「画像を読み込む」からマップのスクリーンショットや<br>地図画像を追加してください。<br>画像なしでも、そのまま矢印やエリアを配置してメモを取れます。',
      notePlaceholder: 'この道の特徴をメモ（信号の向き、道幅、標識など）',
      areaNotePlaceholder: 'このエリアの特徴をメモ',
      deleteArrowBtn: '削除', closePopupBtn: '閉じる',
      colorLabel: '色：',
      quickAccessLabel: '最近使った色',
      commonLabel: 'よく使う色',
      bidirLabel: '双方向矢印にする',
      settingsBtn: '設定',
      sidebarHeader: 'メモ一覧',
      emptyList: 'まだ矢印やエリアがありません。地図上でCtrlを押しながらクリックすると矢印、Shiftを押しながらクリックするとエリア（面）を描けます。',
      noNote: '(メモなし)',
      confirmDeleteFile: (name) => `「${name}」を削除します。地図画像とメモもすべて消えます。よろしいですか？`,
      confirmClear: 'このファイルのメモ（矢印・エリア）をすべて削除します。地図画像は残ります。よろしいですか？',
      confirmLastFile: '最後のファイルは削除できません',
      toastImageLoaded: '画像を読み込みました',
      toastPasteLoaded: 'クリップボードから画像を読み込みました',
      toastFileSwitched: 'ファイルを切り替えました',
      toastFileCreated: '新しいファイルを作成しました',
      toastFileRenamed: 'ファイル名を変更しました',
      toastFileDeleted: 'ファイルを削除しました',
      toastArrowDeleted: '矢印を削除しました',
      toastCleared: 'メモを全消去しました',
      toastExported: 'JSONを書き出しました',
      toastImported: '読み込みました',
      toastImportFailed: '読み込みに失敗しました',
      promptNewFile: '新しいファイル名を入力してください（例: ロシアのメモ）',
      promptRenameFile: 'ファイル名を変更',
      defaultFileName: '無題のメモ',
      newFileDefaultName: '新しいメモ',
    },
    en: {
      title: 'ArrowMap by GeoHunter.jp',
      newFile: '+ New', rename: 'Rename', deleteFile: 'Delete file',
      loadImage: 'Load image',
      undo: 'Undo', redo: 'Redo',
      exportBtn: 'Export', importBtn: 'Import (JSON)', clearBtn: 'Clear notes',
      themeToDark: 'Dark mode', themeToLight: 'Light mode',
      langToggle: '日本語',
      hint: 'Ctrl+click: arrow   Ctrl+right-click: bend the arrow   Shift+click: area   Drag elsewhere: pan map',
      placeholder: 'Click "Load image" to add a map screenshot<br>or a map image.<br>You can also place arrows and areas and take notes without an image.',
      notePlaceholder: 'Note the road\'s features (traffic light direction, road width, signs, etc.)',
      areaNotePlaceholder: 'Note the features of this area',
      deleteArrowBtn: 'Delete', closePopupBtn: 'Close',
      colorLabel: 'Color:',
      quickAccessLabel: 'Recently used',
      commonLabel: 'Common colors',
      bidirLabel: 'Two-way arrow',
      settingsBtn: 'Settings',
      sidebarHeader: 'Notes',
      emptyList: 'No arrows or areas yet. Hold Ctrl and click to start an arrow, or hold Shift and click to draw an area.',
      noNote: '(no note)',
      confirmDeleteFile: (name) => `Delete "${name}"? The map image and all notes will be lost.`,
      confirmClear: 'Delete all notes (arrows and areas) in this file? The map image will remain.',
      confirmLastFile: 'You can\'t delete the last remaining file',
      toastImageLoaded: 'Image loaded',
      toastPasteLoaded: 'Image loaded from clipboard',
      toastFileSwitched: 'Switched file',
      toastFileCreated: 'Created new file',
      toastFileRenamed: 'Renamed file',
      toastFileDeleted: 'File deleted',
      toastArrowDeleted: 'Arrow deleted',
      toastCleared: 'All notes cleared',
      toastExported: 'Exported JSON',
      toastImported: 'Imported',
      toastImportFailed: 'Import failed',
      promptNewFile: 'Enter a name for the new file (e.g. Russia notes)',
      promptRenameFile: 'Rename file',
      defaultFileName: 'Untitled notes',
      newFileDefaultName: 'New notes',
    }
  };
  let lang = 'ja';
  function t(key){ return STRINGS[lang][key]; }

  // ---------- storage adapter (localStorage, works standalone in any browser) ----------
  const storage = {
    async get(key){
      try { const v = localStorage.getItem(key); return v === null ? null : {key, value: v}; }
      catch(e){ return null; }
    },
    async set(key, value){
      try { localStorage.setItem(key, value); return {key, value}; }
      catch(e){ console.error('storage set failed', e); return null; }
    },
    async delete(key){
      try { localStorage.removeItem(key); return {key, deleted: true}; }
      catch(e){ return null; }
    }
  };

  const world = document.getElementById('world');
  const wrap = document.getElementById('canvasWrap');
  const bgImg = document.getElementById('bgImg');
  const svg = document.getElementById('arrowLayer');
  const placeholder = document.getElementById('placeholder');
  const popup = document.getElementById('popup');
  const noteText = document.getElementById('noteText');
  const hoverTip = document.getElementById('hoverTip');
  function showHoverTip(text, evt){
    if (!text || !text.trim()) { hideHoverTip(); return; }
    hoverTip.textContent = text;
    hoverTip.style.display = 'block';
    moveHoverTip(evt);
  }
  function moveHoverTip(evt){
    if (hoverTip.style.display !== 'block') return;
    const pad = 14;
    let x = evt.clientX + pad;
    let y = evt.clientY + pad;
    const rect = hoverTip.getBoundingClientRect();
    if (x + rect.width > window.innerWidth - 8) x = evt.clientX - rect.width - pad;
    if (y + rect.height > window.innerHeight - 8) y = evt.clientY - rect.height - pad;
    hoverTip.style.left = x + 'px';
    hoverTip.style.top = y + 'px';
  }
  function hideHoverTip(){ hoverTip.style.display = 'none'; }
  const colorRow = document.getElementById('colorRow');
  const noteList = document.getElementById('noteList');
  const toast = document.getElementById('toast');
  const fileSelect = document.getElementById('fileSelect');

  const DEFAULT_COLOR = '#b5502e';
  const BASE_COLORS = ['#b5502e', '#1d9e75', '#378add', '#7f77dd', '#d4537e', '#5f5e5a', '#e2a72e', '#2c9e2c'];
  const COMMON_COLORS = ['#e53935', '#1d9e75', '#378add', '#f2b705', '#2b2a26'];
  let recentColors = [];

  let scale = 1, panX = 0, panY = 0;
  let arrows = [];
  let areas = [];
  let selectedId = null;
  let idCounter = 1;
  let imgDataUrl = null;
  const AREA_FILL_OPACITY = 0.28;
  const AREA_STROKE_OPACITY = 0.85;

  let files = [];
  let currentFileId = null;

  let historyStack = [];
  let redoStack = [];

  const KEY_FILES = 'arrowmap-files-list';
  const KEY_RECENT_COLORS = 'arrowmap-recent-colors';
  const KEY_LANG = 'arrowmap-lang';
  const KEY_THEME = 'arrowmap-theme';
  const keyData = (id) => 'arrowmap-file-data:' + id;

  function showToast(msg){
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(()=> toast.classList.remove('show'), 1600);
  }

  function genId(){ return 'f_' + Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

  function applyTransform(){
    world.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
    document.getElementById('zoomReset').textContent = Math.round(scale*100) + '%';
  }

  function worldSize(){
    const w = imgDataUrl ? bgImg.naturalWidth : 1600;
    const h = imgDataUrl ? bgImg.naturalHeight : 1000;
    return {w, h};
  }

  function toWorldCoords(clientX, clientY){
    const rect = wrap.getBoundingClientRect();
    return { x: (clientX - rect.left - panX) / scale, y: (clientY - rect.top - panY) / scale };
  }

  // ---------- language / theme ----------
  function applyLanguage(){
    document.getElementById('title').textContent = 'ArrowMap by GeoHunter.jp';
    document.getElementById('newFileBtn').textContent = t('newFile');
    document.getElementById('renameFileBtn').textContent = t('rename');
    document.getElementById('deleteFileBtn').textContent = t('deleteFile');
    document.getElementById('loadBtn').textContent = t('loadImage');
    document.getElementById('undoBtn').textContent = t('undo');
    document.getElementById('redoBtn').textContent = t('redo');
    document.getElementById('exportBtn').textContent = t('exportBtn');
    document.getElementById('importBtn').textContent = t('importBtn');
    document.getElementById('clearBtn').textContent = t('clearBtn');
    document.getElementById('langToggle').textContent = t('langToggle');
    document.getElementById('hint').textContent = t('hint');
    document.getElementById('placeholder').innerHTML = t('placeholder');
    noteText.placeholder = t('notePlaceholder');
    document.getElementById('deleteArrowBtn').textContent = t('deleteArrowBtn');
    document.getElementById('closePopupBtn').textContent = t('closePopupBtn');
    document.getElementById('colorLabel').textContent = t('colorLabel');
    document.getElementById('quickAccessLabel').textContent = t('quickAccessLabel');
    document.getElementById('commonLabel').textContent = t('commonLabel');

  // ---------- undo / redo ----------
  function snapshot(){ return JSON.stringify({arrows, areas, image: imgDataUrl}); }
  function pushUndo(){

    if (historyStack.length > 60) historyStack.shift();
    redoStack = [];

  }
  function stillSelected(){ return arrows.find(a => a.id === selectedId) || areas.find(a => a.id === selectedId); }
  function applySnapshotImage(img){

  }
  function undo(){
    if (!historyStack.length) return;
    redoStack.push(snapshot());
    const s = JSON.parse(historyStack.pop());
    arrows = s.arrows || []; areas = s.areas || [];
    applySnapshotImage(s.image);
    if (selectedId != null && !stillSelected()) { selectedId = null; popup.style.display = 'none'; }
    renderArrows(); renderList(); scheduleSave(); updateUndoRedoButtons();
  }
  function redo(){
    if (!redoStack.length) return;
    historyStack.push(snapshot());
    const s = JSON.parse(redoStack.pop());
    arrows = s.arrows || []; areas = s.areas || [];
    applySnapshotImage(s.image);
    if (selectedId != null && !stillSelected()) { selectedId = null; popup.style.display = 'none'; }
    renderArrows(); renderList(); scheduleSave(); updateUndoRedoButtons();
  }
  function updateUndoRedoButtons(){
    document.getElementById('undoBtn').disabled = historyStack.length === 0;
    document.getElementById('redoBtn').disabled = redoStack.length === 0;
  }
  document.getElementById('undoBtn').addEventListener('click', undo);
  document.getElementById('redoBtn').addEventListener('click', redo);

  // ---------- arrow path helpers ----------
  function pathData(points){
    return points.map((p,i) => (i===0 ? 'M' : 'L') + p.x + ',' + p.y).join(' ');
  }
  function pathLength(points){
    let d = 0;
    for (let i=1;i<points.length;i++){
      d += Math.hypot(points[i].x - points[i-1].x, points[i].y - points[i-1].y);
    }
    return d;
  }
  function boundsCenter(points){
    const xs = points.map(p=>p.x), ys = points.map(p=>p.y);
    return { x: (Math.min(...xs) + Math.max(...xs)) / 2, y: (Math.min(...ys) + Math.max(...ys)) / 2 };
  }
  function pointAtT(points, t){
    const total = pathLength(points);
    if (total === 0) return points[0];
    const target = total * t;
    let acc = 0;
    for (let i=1;i<points.length;i++){
      const segLen = Math.hypot(points[i].x - points[i-1].x, points[i].y - points[i-1].y);
      if (acc + segLen >= target){
        const ratio = segLen === 0 ? 0 : (target - acc) / segLen;
        return {
          x: points[i-1].x + (points[i].x - points[i-1].x) * ratio,
          y: points[i-1].y + (points[i].y - points[i-1].y) * ratio
        };
      }
      acc += segLen;
    }
    return points[points.length - 1];
  }
  function colorId(hex){ return hex.replace('#','').toLowerCase(); }
  // returns '#000' or '#fff' depending on which is more readable on top of the given hex color
  function contrastTextColor(hex){
    if (!hex) return '#fff';
    const h = hex.replace('#','');
    const full = h.length === 3 ? h.split('').map(c => c+c).join('') : h;
    const r = parseInt(full.substring(0,2), 16);
    const g = parseInt(full.substring(2,4), 16);
    const b = parseInt(full.substring(4,6), 16);
    if ([r,g,b].some(v => Number.isNaN(v))) return '#fff';
    // relative luminance (perceived brightness)
    const luminance = (0.299*r + 0.587*g + 0.114*b) / 255;
    return luminance > 0.62 ? '#000' : '#fff';
  }

  // ---------- smoothing for area outlines (closed Catmull-Rom -> cubic Bezier) ----------
  // Keeps the shape (concave/convex bumps) the user actually clicked, but
  // takes the edge off sharp corners instead of leaving a jagged polygon.
  // AREA_SMOOTH_ALPHA controls how much rounding is applied: 0 = straight
  // lines between the clicked points (no rounding at all), 1 = full
  // Catmull-Rom curve (a lot of rounding, shape drifts further from the
  // clicked points). A low value keeps the outline close to what was
  // actually clicked while still softening the corners a bit.
  const AREA_SMOOTH_ALPHA = 0.22;
  function smoothClosedPath(pts){
    const n = pts.length;
    if (n < 3) return '';
    if (n === 3) {
      // triangle: light rounding only, Catmull-Rom on 3 pts can overshoot
      return pathData(pts) + ' Z';
    }
    let d = 'M ' + pts[0].x.toFixed(2) + ',' + pts[0].y.toFixed(2) + ' ';
    for (let i=0;i<n;i++){
      const p0 = pts[(i-1+n)%n];
      const p1 = pts[i];
      const p2 = pts[(i+1)%n];
      const p3 = pts[(i+2)%n];
      const cp1x = p1.x + (p2.x - p0.x) * (AREA_SMOOTH_ALPHA / 3);
      const cp1y = p1.y + (p2.y - p0.y) * (AREA_SMOOTH_ALPHA / 3);
      const cp2x = p2.x - (p3.x - p1.x) * (AREA_SMOOTH_ALPHA / 3);
      const cp2y = p2.y - (p3.y - p1.y) * (AREA_SMOOTH_ALPHA / 3);
      d += 'C ' + cp1x.toFixed(2) + ',' + cp1y.toFixed(2) + ' ' + cp2x.toFixed(2) + ',' + cp2y.toFixed(2) + ' ' + p2.x.toFixed(2) + ',' + p2.y.toFixed(2) + ' ';
    }
    return d + 'Z';
  }

  // ---------- combined numbering (arrows + areas share one sequence) ----------
  function combinedSorted(){
    const list = [
      ...arrows.map(a => ({ ref: a, type: 'arrow' })),
      ...areas.map(a => ({ ref: a, type: 'area' }))
    ];
    list.sort((x,y) => x.ref.id - y.ref.id);
    return list;
  }
  function numberMap(){
    const map = {};
    combinedSorted().forEach((entry, idx) => { map[entry.ref.id] = idx + 1; });
    return map;
  }

  // ---------- rendering ----------
  function renderArrows(){
    const {w,h} = worldSize();
    svg.setAttribute('width', w); svg.setAttribute('height', h);
    svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
    svg.innerHTML = '';

    const nums = numberMap();

    const usedColors = new Set(arrows.map(a => a.color || DEFAULT_COLOR));
    usedColors.add(DEFAULT_COLOR);
    const defs = document.createElementNS('http://www.w3.org/2000/svg','defs');
    usedColors.forEach(c => {
      const m = document.createElementNS('http://www.w3.org/2000/svg','marker');
      m.setAttribute('id', 'arrowhead-' + colorId(c));
      m.setAttribute('markerWidth', '4.0625');
      m.setAttribute('markerHeight', '4.0625');
      m.setAttribute('refX', '2.84375');
      m.setAttribute('refY', '2.03125');
      m.setAttribute('orient', 'auto');
      const path = document.createElementNS('http://www.w3.org/2000/svg','path');
      path.setAttribute('d', 'M0,0 L4.0625,2.03125 L0,4.0625 Z');
      path.setAttribute('fill', c);
      m.appendChild(path);
      defs.appendChild(m);

      const ms = document.createElementNS('http://www.w3.org/2000/svg','marker');
      ms.setAttribute('id', 'arrowhead-start-' + colorId(c));
      ms.setAttribute('markerWidth', '4.0625');
      ms.setAttribute('markerHeight', '4.0625');
      ms.setAttribute('refX', '2.84375');
      ms.setAttribute('refY', '2.03125');
      ms.setAttribute('orient', 'auto-start-reverse');
      const paths = document.createElementNS('http://www.w3.org/2000/svg','path');
      paths.setAttribute('d', 'M0,0 L4.0625,2.03125 L0,4.0625 Z');
      paths.setAttribute('fill', c);
      ms.appendChild(paths);
      defs.appendChild(ms);
    });
    svg.appendChild(defs);

    // areas render first so arrows always draw on top of the shading
    areas.forEach((a) => {
      const color = a.color || DEFAULT_COLOR;
      const selected = a.id === selectedId;
      const pts = a.points;
      const g = document.createElementNS('http://www.w3.org/2000/svg','g');

      const shape = document.createElementNS('http://www.w3.org/2000/svg','path');
      shape.setAttribute('d', smoothClosedPath(pts));
      shape.setAttribute('class', 'area-shape' + (selected ? ' selected' : ''));
      shape.setAttribute('fill', color);
      shape.setAttribute('fill-opacity', AREA_FILL_OPACITY);
      shape.setAttribute('stroke', color);
      shape.setAttribute('stroke-opacity', AREA_STROKE_OPACITY);
      shape.setAttribute('stroke-width', '2');
      shape.addEventListener('mousedown', (e) => e.stopPropagation());
      shape.addEventListener('click', (e) => { if (e.ctrlKey || e.metaKey || e.shiftKey) return; e.stopPropagation(); openPopupFor(a.id); });
      shape.addEventListener('mouseenter', (e) => showHoverTip(a.note, e));
      shape.addEventListener('mousemove', (e) => moveHoverTip(e));
      shape.addEventListener('mouseleave', hideHoverTip);
      g.appendChild(shape);

      const c = boundsCenter(pts);
      const rectW = 20, rectH = 20;
      const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
      rect.setAttribute('x', c.x - rectW/2); rect.setAttribute('y', c.y - rectH/2);
      rect.setAttribute('width', rectW); rect.setAttribute('height', rectH);
      rect.setAttribute('rx', 5);
      rect.setAttribute('class', 'area-num-bg' + (selected ? ' selected' : ''));
      rect.setAttribute('fill', color);

      const num = document.createElementNS('http://www.w3.org/2000/svg','text');
      num.setAttribute('x', c.x); num.setAttribute('y', c.y);
      num.setAttribute('class', 'arrow-num');
      num.style.fill = contrastTextColor(color);
      num.textContent = nums[a.id];

      g.appendChild(rect); g.appendChild(num);
      svg.appendChild(g);
    });

    arrows.forEach((a) => {
      const color = a.color || DEFAULT_COLOR;
      const selected = a.id === selectedId;
      const pts = a.points;
      const g = document.createElementNS('http://www.w3.org/2000/svg','g');

      const hit = document.createElementNS('http://www.w3.org/2000/svg','path');
      hit.setAttribute('d', pathData(pts));
      hit.setAttribute('class', 'arrow-hit');
      hit.addEventListener('mousedown', (e) => e.stopPropagation());
      hit.addEventListener('click', (e) => { if (e.ctrlKey || e.metaKey || e.shiftKey) return; e.stopPropagation(); openPopupFor(a.id); });
      hit.addEventListener('mouseenter', (e) => showHoverTip(a.note, e));
      hit.addEventListener('mousemove', (e) => moveHoverTip(e));
      hit.addEventListener('mouseleave', hideHoverTip);

      const shaft = document.createElementNS('http://www.w3.org/2000/svg','path');
      shaft.setAttribute('d', pathData(pts));
      shaft.setAttribute('class', 'arrow-shaft' + (selected ? ' selected' : ''));
      shaft.setAttribute('stroke', color);
      shaft.setAttribute('marker-end', 'url(#arrowhead-' + colorId(color) + ')');
      if (a.bidirectional) shaft.setAttribute('marker-start', 'url(#arrowhead-start-' + colorId(color) + ')');

      g.appendChild(hit); g.appendChild(shaft);

      for (let i=1;i<pts.length-1;i++){
        const dot = document.createElementNS('http://www.w3.org/2000/svg','circle');
        dot.setAttribute('cx', pts[i].x); dot.setAttribute('cy', pts[i].y);
        dot.setAttribute('r', 3);
        dot.setAttribute('class', 'bend-dot');
        dot.setAttribute('stroke', color);
        dot.setAttribute('stroke-width', '2');
        g.appendChild(dot);
      }

      // for a bidirectional arrow both ends have arrowheads, so the number
      // badge is placed at the midpoint instead of the start to stay visible
      const numPos = a.bidirectional ? pointAtT(pts, 0.5) : pts[0];

      const circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
      circle.setAttribute('cx', numPos.x); circle.setAttribute('cy', numPos.y);
      circle.setAttribute('r', 10);
      circle.setAttribute('class', 'arrow-num-bg' + (selected ? ' selected' : ''));
      circle.setAttribute('fill', color);

      const num = document.createElementNS('http://www.w3.org/2000/svg','text');
      num.setAttribute('x', numPos.x); num.setAttribute('y', numPos.y);
      num.setAttribute('class', 'arrow-num');
      num.style.fill = contrastTextColor(color);
      num.textContent = nums[a.id];

      g.appendChild(circle); g.appendChild(num);
      svg.appendChild(g);
    });
  }

  function renderList(){
    const combined = combinedSorted();
    if (combined.length === 0) {
      noteList.innerHTML = `<div id="emptyList">${t('emptyList')}</div>`;
      return;
    }
    noteList.innerHTML = '';
    combined.forEach((entry, idx) => {
      const a = entry.ref;
      const color = a.color || DEFAULT_COLOR;
      const item = document.createElement('div');
      item.className = 'note-item' + (a.id === selectedId ? ' selected' : '');
      const hasNote = a.note && a.note.trim();
      const bodyText = hasNote ? a.note : t('noNote');
      const shapeClass = entry.type === 'area' ? 'num square' : 'num';
      item.innerHTML = `<span class="${shapeClass}" style="background:${color}">${idx+1}</span><span class="body ${!hasNote ? 'empty' : ''}"></span>`;
      item.querySelector('.body').textContent = bodyText;
      item.addEventListener('click', () => {
        selectedId = a.id;
        renderArrows(); renderList(); focusOnItem(a, entry.type);
      });
      noteList.appendChild(item);
    });
  }

  function focusOnItem(a){
    const rect = wrap.getBoundingClientRect();
    const c = boundsCenter(a.points);
    panX = rect.width/2 - c.x * scale;
    panY = rect.height/2 - c.y * scale;
    applyTransform();
  }

  // ---------- popup: gradient color picker ----------
  const cpBox = document.getElementById('cpBox');
  const cpBoxThumb = document.getElementById('cpBoxThumb');
  const cpHueBar = document.getElementById('cpHueBar');
  const cpHueThumb = document.getElementById('cpHueThumb');
  const cpHex = document.getElementById('cpHex');
  const commonColorRow = document.getElementById('commonColorRow');

  let cpHue = 15, cpSat = 0.6, cpVal = 0.7;

  function hexToRgb(hex){
    hex = hex.replace('#','');
    if (hex.length === 3) hex = hex.split('').map(c => c+c).join('');
    const num = parseInt(hex, 16);
    return { r: (num >> 16) & 255, g: (num >> 8) & 255, b: num & 255 };
  }
  function rgbToHex(r,g,b){
    return '#' + [r,g,b].map(v => Math.round(Math.max(0,Math.min(255,v))).toString(16).padStart(2,'0')).join('');
  }
  function rgbToHsv(r,g,b){
    r/=255; g/=255; b/=255;
    const max = Math.max(r,g,b), min = Math.min(r,g,b), d = max - min;
    let h = 0;
    if (d !== 0) {
      if (max === r) h = ((g-b)/d) % 6;
      else if (max === g) h = (b-r)/d + 2;
      else h = (r-g)/d + 4;
      h *= 60;
      if (h < 0) h += 360;
    }
    return { h, s: max === 0 ? 0 : d/max, v: max };
  }
  function hsvToRgb(h,s,v){
    const c = v*s, x = c*(1-Math.abs((h/60)%2-1)), m = v-c;
    let r,g,b;
    if (h < 60) [r,g,b] = [c,x,0];
    else if (h < 120) [r,g,b] = [x,c,0];
    else if (h < 180) [r,g,b] = [0,c,x];
    else if (h < 240) [r,g,b] = [0,x,c];
    else if (h < 300) [r,g,b] = [x,0,c];
    else [r,g,b] = [c,0,x];
    return { r: (r+m)*255, g: (g+m)*255, b: (b+m)*255 };
  }
  function isValidHex(hex){ return /^#[0-9a-fA-F]{6}$/.test(hex); }
  function currentHex(){ const {r,g,b} = hsvToRgb(cpHue, cpSat, cpVal); return rgbToHex(r,g,b); }

  function renderCpUI(){
    cpBox.style.backgroundColor = `hsl(${cpHue}, 100%, 50%)`;
    cpBoxThumb.style.left = (cpSat*100) + '%';
    cpBoxThumb.style.top = ((1-cpVal)*100) + '%';
    cpHueThumb.style.left = (cpHue/360*100) + '%';
    cpHex.value = currentHex().toUpperCase();
  }

  function findSelected(){
    let a = arrows.find(x => x.id === selectedId);
    if (a) return { item: a, type: 'arrow' };
    a = areas.find(x => x.id === selectedId);
    if (a) return { item: a, type: 'area' };
    return null;
  }

  function applyLiveColor(){
    const hex = currentHex();
    const found = findSelected();
    if (found) { found.item.color = hex; renderArrows(); renderList(); scheduleSave(); }
    cpHex.value = hex.toUpperCase();
  }

  async function commitColor(hex){
    await addRecentColor(hex);
    renderSwatchRows(hex);
  }

  function renderSwatchRows(selectedColor){
    const sel = (selectedColor||'').toLowerCase();
    colorRow.innerHTML = '';
    recentColors.forEach(c => {
      const b = document.createElement('button');
      b.className = 'swatch' + (c.toLowerCase() === sel ? ' selected' : '');
      b.style.background = c;
      b.title = c;
      b.addEventListener('click', async () => {
        setColorFromHex(c);
        applyLiveColor();
        await commitColor(c);
      });
      colorRow.appendChild(b);
    });
    commonColorRow.innerHTML = '';
    COMMON_COLORS.forEach(c => {
      const b = document.createElement('button');
      b.className = 'swatch' + (c.toLowerCase() === sel ? ' selected' : '');
      b.style.background = c;
      b.title = c;
      b.addEventListener('click', async () => {
        setColorFromHex(c);
        applyLiveColor();
        await commitColor(c);
      });
      commonColorRow.appendChild(b);
    });
  }

  function setColorFromHex(hex){
    const {r,g,b} = hexToRgb(hex);
    const hsv = rgbToHsv(r,g,b);
    cpHue = hsv.h; cpSat = hsv.s || 0; cpVal = hsv.v || 0;
    renderCpUI();
  }

  function buildColorPicker(selectedColor){
    setColorFromHex(selectedColor || DEFAULT_COLOR);
    renderSwatchRows(selectedColor || DEFAULT_COLOR);
  }

  function boxPointToSV(clientX, clientY){
    const rect = cpBox.getBoundingClientRect();
    const x = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    const y = Math.max(0, Math.min(1, (clientY - rect.top) / rect.height));
    return { s: x, v: 1 - y };
  }
  function huePointToHue(clientX){
    const rect = cpHueBar.getBoundingClientRect();
    const x = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    return x * 360;
  }

  let cpDragTarget = null;
  cpBox.addEventListener('pointerdown', (e) => {
    cpDragTarget = 'box';
    const {s,v} = boxPointToSV(e.clientX, e.clientY);
    cpSat = s; cpVal = v;
    renderCpUI(); applyLiveColor();
    cpBox.setPointerCapture(e.pointerId);
  });
  cpHueBar.addEventListener('pointerdown', (e) => {
    cpDragTarget = 'hue';
    cpHue = huePointToHue(e.clientX);
    renderCpUI(); applyLiveColor();
    cpHueBar.setPointerCapture(e.pointerId);
  });
  window.addEventListener('pointermove', (e) => {
    if (!cpDragTarget) return;
    if (cpDragTarget === 'box') {
      const {s,v} = boxPointToSV(e.clientX, e.clientY);
      cpSat = s; cpVal = v;
    } else {
      cpHue = huePointToHue(e.clientX);
    }
    renderCpUI(); applyLiveColor();
  });
  window.addEventListener('pointerup', async () => {
    if (!cpDragTarget) return;
    cpDragTarget = null;
    await commitColor(currentHex());
  });

  cpHex.addEventListener('keydown', (e) => { if (e.key === 'Enter') cpHex.blur(); });
  cpHex.addEventListener('blur', async () => {
    let hex = cpHex.value.trim();
    if (hex && hex[0] !== '#') hex = '#' + hex;
    if (!isValidHex(hex)) { cpHex.value = currentHex().toUpperCase(); return; }
    setColorFromHex(hex);
    applyLiveColor();
    await commitColor(hex);
  });

  const bidirWrap = document.getElementById('bidirWrap');
  const bidirCheck = document.getElementById('bidirCheck');

  function openPopupCommon(id, type, item){
    selectedId = id;
    noteText.value = item.note || '';
    noteText.placeholder = type === 'area' ? t('areaNotePlaceholder') : t('notePlaceholder');
    buildColorPicker(item.color || DEFAULT_COLOR);
    if (type === 'arrow') {
      bidirWrap.style.display = 'flex';
      bidirCheck.checked = !!item.bidirectional;
    } else {
      bidirWrap.style.display = 'none';
    }
    positionPopup(item, type);
    popup.style.display = 'block';
    renderArrows(); renderList();
    noteText.focus();
  }
  function findById(id){
    let a = arrows.find(x => x.id === id);
    if (a) return { item: a, type: 'arrow' };
    a = areas.find(x => x.id === id);
    if (a) return { item: a, type: 'area' };
    return null;
  }
  function openPopupFor(id){
    const found = findById(id);
    if (!found) return;
    if (selectedId !== id) pushUndo();
    openPopupCommon(id, found.type, found.item);
  }
  function openPopupForNoHistory(id){
    const found = findById(id);
    if (!found) return;
    openPopupCommon(id, found.type, found.item);
  }

  bidirCheck.addEventListener('change', () => {
    const found = findSelected();
    if (found && found.type === 'arrow') {
      found.item.bidirectional = bidirCheck.checked;
      renderArrows(); scheduleSave();
    }
  });

  function positionPopup(item, type){
    const rect = wrap.getBoundingClientRect();
    const ref = type === 'area' ? boundsCenter(item.points) : item.points[item.points.length - 1];
    const midX = ref.x * scale + panX;
    const midY = ref.y * scale + panY;
    let left = midX + 16, top = midY - 20;
    if (left + 275 > rect.width) left = midX - 285;
    if (left < 0) left = 10;
    if (top + 420 > rect.height) top = Math.max(10, rect.height - 430);
    if (top < 0) top = 10;
    popup.style.left = left + 'px';
    popup.style.top = top + 'px';
  }

  function closePopup(save){
    if (save && selectedId != null) {
      const found = findSelected();
      if (found) { found.item.note = noteText.value; scheduleSave(); }
    }
    popup.style.display = 'none';
    renderArrows(); renderList();
  }

  document.getElementById('closePopupBtn').addEventListener('click', () => closePopup(true));
  document.getElementById('deleteArrowBtn').addEventListener('click', () => {
    pushUndo();
    arrows = arrows.filter(a => a.id !== selectedId);
    areas = areas.filter(a => a.id !== selectedId);
    selectedId = null;
    popup.style.display = 'none';
    renderArrows(); renderList(); scheduleSave();
    showToast(t('toastArrowDeleted'));
  });
  noteText.addEventListener('input', () => {
    if (selectedId != null) {
      const found = findSelected();
      if (found) found.item.note = noteText.value;
    }
  });
  noteText.addEventListener('blur', () => { renderList(); scheduleSave(); });

  // ---------- zoom ----------
  function zoomAt(clientX, clientY, factor){
    const rect = wrap.getBoundingClientRect();
    const localX = clientX - rect.left, localY = clientY - rect.top;
    const worldX = (localX - panX) / scale, worldY = (localY - panY) / scale;
    scale = Math.min(8, Math.max(0.1, scale * factor));
    panX = localX - worldX * scale;
    panY = localY - worldY * scale;
    applyTransform();
    if (isDrawingPath) drawPreview();
    if (isDrawingArea) drawAreaPreview();
  }
  document.getElementById('zoomIn').addEventListener('click', () => {
    const r = wrap.getBoundingClientRect();
    zoomAt(r.left + r.width/2, r.top + r.height/2, 1.25);
  });
  document.getElementById('zoomOut').addEventListener('click', () => {
    const r = wrap.getBoundingClientRect();
    zoomAt(r.left + r.width/2, r.top + r.height/2, 0.8);
  });
  document.getElementById('zoomReset').addEventListener('click', () => {
    scale = 1; panX = 0; panY = 0; applyTransform();
  });
  wrap.addEventListener('wheel', (e) => {
    e.preventDefault();
    zoomAt(e.clientX, e.clientY, e.deltaY < 0 ? 1.1 : 0.9);
  }, {passive: false});

  // ---------- pan + ctrl-based polyline drawing + shift-based area drawing ----------
  let isPanning = false, panStart = {x:0,y:0}, panOrigin = {x:0,y:0};
  let isDrawingPath = false;
  let currentPoints = [];
  let tempGroup = null;
  let isDrawingArea = false;
  let areaPoints = [];
  let tempAreaGroup = null;
  const AREA_CLOSE_PX = 16; // screen-pixel radius around the first point that closes the area

  function inChrome(e){ return e.target.closest('#toolbar') || e.target.closest('#popup'); }

  wrap.addEventListener('mousedown', (e) => {
    if (inChrome(e)) return;
    if (e.button === 2) return;
    if (popup.style.display === 'block') closePopup(true);
    if (e.ctrlKey || e.metaKey || e.shiftKey) return;
    isPanning = true;
    wrap.classList.add('panning');
    panStart = {x: e.clientX, y: e.clientY};
    panOrigin = {x: panX, y: panY};
  });

  wrap.addEventListener('click', (e) => {
    if (inChrome(e)) return;
    if (e.ctrlKey || e.metaKey) {
      e.preventDefault();
      const wc = toWorldCoords(e.clientX, e.clientY);
      if (!isDrawingPath) {
        isDrawingPath = true;
        currentPoints = [wc];
        drawPreview();
      } else {
        currentPoints.push(wc);
        finalizeArrow();
      }
      return;
    }
    if (e.shiftKey) {
      e.preventDefault();
      const wc = toWorldCoords(e.clientX, e.clientY);
      if (!isDrawingArea) {
        isDrawingArea = true;
        areaPoints = [wc];
        drawAreaPreview();
      } else {
        const first = areaPoints[0];
        const screenDist = Math.hypot((wc.x - first.x) * scale, (wc.y - first.y) * scale);
        if (areaPoints.length >= 3 && screenDist <= AREA_CLOSE_PX) {
          finalizeArea();
        } else {
          areaPoints.push(wc);
          drawAreaPreview();
        }
      }
      return;
    }
  });

  wrap.addEventListener('contextmenu', (e) => {
    if (inChrome(e)) return;
    if (e.ctrlKey || e.metaKey) {
      e.preventDefault();
      if (isDrawingPath) {
        const wc = toWorldCoords(e.clientX, e.clientY);
        currentPoints.push(wc);
        drawPreview();
      }
    }
  });

  window.addEventListener('mousemove', (e) => {
    if (isPanning) {
      panX = panOrigin.x + (e.clientX - panStart.x);
      panY = panOrigin.y + (e.clientY - panStart.y);
      applyTransform();
    } else if (isDrawingPath) {
      hoverPoint = toWorldCoords(e.clientX, e.clientY);
      drawPreview();
    } else if (isDrawingArea) {
      hoverPoint = toWorldCoords(e.clientX, e.clientY);
      drawAreaPreview();
    }
  });

  window.addEventListener('mouseup', () => {
    if (isPanning) { isPanning = false; wrap.classList.remove('panning'); }
  });

  window.addEventListener('keydown', (e) => {
    if (e.key === 'Control' || e.key === 'Meta') wrap.classList.add('ctrlActive');
    if (e.key === 'Shift') wrap.classList.add('shiftActive');
    if (e.key === 'Escape') {
      if (isDrawingPath) { cancelDrawing(); }
      else if (isDrawingArea) { cancelAreaDrawing(); }
      else if (popup.style.display === 'block') { closePopup(true); }
    }
    const ctrlOrCmd = e.ctrlKey || e.metaKey;
    if (ctrlOrCmd && e.key.toLowerCase() === 'z' && !e.shiftKey) { e.preventDefault(); undo(); }
    if (ctrlOrCmd && (e.key.toLowerCase() === 'y' || (e.key.toLowerCase() === 'z' && e.shiftKey))) { e.preventDefault(); redo(); }
  });
  window.addEventListener('keyup', (e) => {
    if (e.key === 'Control' || e.key === 'Meta') wrap.classList.remove('ctrlActive');
    if (e.key === 'Shift') wrap.classList.remove('shiftActive');
  });
  window.addEventListener('blur', () => {
    wrap.classList.remove('ctrlActive');
    wrap.classList.remove('shiftActive');
    if (isPanning) { isPanning = false; wrap.classList.remove('panning'); }
  });

  let hoverPoint = null;
  function drawPreview(){
    removeTempPath();
    const pts = hoverPoint ? [...currentPoints, hoverPoint] : currentPoints;
    if (pts.length < 1) return;
    tempGroup = document.createElementNS('http://www.w3.org/2000/svg','g');
    if (pts.length > 1) {
      const line = document.createElementNS('http://www.w3.org/2000/svg','path');
      line.setAttribute('d', pathData(pts));
      line.setAttribute('stroke', DEFAULT_COLOR);
      line.setAttribute('stroke-width', '4');
      line.setAttribute('stroke-dasharray', '6 4');
      line.setAttribute('fill', 'none');
      line.setAttribute('marker-end', 'url(#arrowhead-' + colorId(DEFAULT_COLOR) + ')');
      tempGroup.appendChild(line);
    }
    currentPoints.forEach((p, i) => {
      const dot = document.createElementNS('http://www.w3.org/2000/svg','circle');
      dot.setAttribute('cx', p.x); dot.setAttribute('cy', p.y);
      dot.setAttribute('r', i===0 ? 6 : 3.5);
      dot.setAttribute('fill', DEFAULT_COLOR);
      dot.setAttribute('opacity', '0.85');
      tempGroup.appendChild(dot);
    });
    svg.appendChild(tempGroup);
  }
  function removeTempPath(){ if (tempGroup) { tempGroup.remove(); tempGroup = null; } }
  function cancelDrawing(){
    isDrawingPath = false;
    currentPoints = [];
    hoverPoint = null;
    removeTempPath();
  }

  function finalizeArrow(){
    const pts = currentPoints;
    isDrawingPath = false;
    hoverPoint = null;
    removeTempPath();
    if (pts.length < 2 || pathLength(pts) < 8) { currentPoints = []; return; }
    pushUndo();
    const id = idCounter++;
    const color = recentColors[0] || DEFAULT_COLOR;
    arrows.push({id, points: pts, note: '', color, bidirectional: false});
    currentPoints = [];
    renderArrows(); renderList(); scheduleSave();
    openPopupForNoHistory(id);
  }

  // ---------- area (shift+click) drawing preview / finalize ----------
  function drawAreaPreview(){
    removeTempAreaPath();
    const pts = hoverPoint ? [...areaPoints, hoverPoint] : areaPoints;
    if (pts.length < 1) return;
    tempAreaGroup = document.createElementNS('http://www.w3.org/2000/svg','g');
    const color = recentColors[0] || DEFAULT_COLOR;

    // highlight the closing target once we have enough points to close
    let nearClose = false;
    if (areaPoints.length >= 3 && hoverPoint) {
      const first = areaPoints[0];
      const screenDist = Math.hypot((hoverPoint.x - first.x) * scale, (hoverPoint.y - first.y) * scale);
      nearClose = screenDist <= AREA_CLOSE_PX;
    }

    if (pts.length > 1) {
      const line = document.createElementNS('http://www.w3.org/2000/svg','path');
      line.setAttribute('d', pathData(pts));
      line.setAttribute('stroke', nearClose ? '#1e8e4a' : color);
      line.setAttribute('stroke-width', '3');
      line.setAttribute('stroke-dasharray', '6 4');
      line.setAttribute('fill', 'none');
      tempAreaGroup.appendChild(line);
    }
    areaPoints.forEach((p, i) => {
      const dot = document.createElementNS('http://www.w3.org/2000/svg','circle');
      dot.setAttribute('cx', p.x); dot.setAttribute('cy', p.y);
      dot.setAttribute('r', i === 0 ? 9 : 3.5);
      dot.setAttribute('fill', i === 0 ? (nearClose ? '#1e8e4a' : '#fff') : color);
      dot.setAttribute('stroke', color);
      dot.setAttribute('stroke-width', i === 0 ? 3 : 0);
      dot.setAttribute('opacity', '0.9');
      tempAreaGroup.appendChild(dot);
    });
    svg.appendChild(tempAreaGroup);
  }
  function removeTempAreaPath(){ if (tempAreaGroup) { tempAreaGroup.remove(); tempAreaGroup = null; } }
  function cancelAreaDrawing(){
    isDrawingArea = false;
    areaPoints = [];
    hoverPoint = null;
    removeTempAreaPath();
  }

  function finalizeArea(){
    const pts = areaPoints;
    isDrawingArea = false;
    hoverPoint = null;
    removeTempAreaPath();
    if (pts.length < 3) { areaPoints = []; return; }
    pushUndo();
    const id = idCounter++;
    const color = recentColors[0] || DEFAULT_COLOR;
    areas.push({id, points: pts, note: '', color});
    areaPoints = [];
    renderArrows(); renderList(); scheduleSave();
    openPopupForNoHistory(id);
  }

  // ---------- image load ----------
  document.getElementById('loadBtn').addEventListener('click', () => document.getElementById('fileInput').click());
  document.getElementById('fileInput').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => { pushUndo(); setImage(ev.target.result, true); showToast(t('toastImageLoaded')); };
    reader.readAsDataURL(file);
    e.target.value = '';
  });
  window.addEventListener('paste', (e) => {
    const items = e.clipboardData && e.clipboardData.items;
    if (!items) return;
    for (const item of items) {
      if (item.type.indexOf('image') === 0) {
        const file = item.getAsFile();
        const reader = new FileReader();
        reader.onload = (ev) => { pushUndo(); setImage(ev.target.result, true); showToast(t('toastPasteLoaded')); };
        reader.readAsDataURL(file);
      }
    }
  });

  // ---------- export / import ----------
  document.getElementById('exportBtn').addEventListener('click', () => {
    const f = files.find(x => x.id === currentFileId);
    const data = { name: f ? f.name : 'ArrowMap', arrows, areas, image: imgDataUrl, exportedAt: new Date().toISOString() };
    const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'arrowmap-' + (f ? f.name : 'memo') + '-' + new Date().toISOString().slice(0,10) + '.json';
    a.click();
    URL.revokeObjectURL(url);
    showToast(t('toastExported'));
  });

  document.getElementById('importBtn').addEventListener('click', () => document.getElementById('importInput').click());
  document.getElementById('importInput').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        pushUndo();
        arrows = (data.arrows || []).map(a => {
          if (a.points) return {...a, color: a.color || DEFAULT_COLOR, bidirectional: !!a.bidirectional};
          return {id: a.id, points: [{x:a.x1,y:a.y1},{x:a.x2,y:a.y2}], note: a.note || '', color: a.color || DEFAULT_COLOR, bidirectional: false};
        });
        areas = (data.areas || []).map(a => ({...a, color: a.color || DEFAULT_COLOR}));
        idCounter = Math.max(
          arrows.reduce((m,a) => Math.max(m, a.id), 0),
          areas.reduce((m,a) => Math.max(m, a.id), 0)
        ) + 1;
        if (data.image) setImage(data.image, false);
        renderArrows(); renderList(); scheduleSave();
        showToast(t('toastImported'));
      } catch(err) { showToast(t('toastImportFailed')); }
    };
    reader.readAsText(file);
    e.target.value = '';
  });

  document.getElementById('clearBtn').addEventListener('click', () => {
    if (!confirm(t('confirmClear'))) return;
    pushUndo();
    arrows = [];
    areas = [];
    selectedId = null;
    popup.style.display = 'none';
    renderArrows(); renderList(); scheduleSave();
    showToast(t('toastCleared'));
  });

  // ---------- init ----------
  async function init(){
    try {
      const langRes = await storage.get(KEY_LANG);
      if (langRes && langRes.value) lang = langRes.value;
    } catch(e) {}
    try {
      const themeRes = await storage.get(KEY_THEME);
      applyTheme((themeRes && themeRes.value) || 'light');
    } catch(e) { applyTheme('light'); }
    await loadRecentColors();
    applyTransform();
    await loadFilesList();
    populateFileSelect();
    await loadFileData(currentFileId);
    applyLanguage();
  }
  init();
})();
</script>
</body>
</html>
